<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#060d1a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="OUEngine"/>
  <meta name="description" content="OUEngine Signal Terminal — Sinais financeiros profissionais"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>OUEngine</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #060d1a;
      --bg-card:    #0f172a;
      --bg-panel:   #0b1629;
      --bg-input:   #0d1f3c;
      --border:     #1e293b;
      --border-blue:#1e3a5f;
      --text:       #f1f5f9;
      --text-muted: #64748b;
      --text-dim:   #334155;
      --blue:       #3b82f6;
      --blue-dark:  #1d4ed8;
      --purple:     #8b5cf6;
      --yellow:     #facc15;
      --green:      #22c55e;
      --green-2:    #10b981;
      --green-1:    #4ade80;
      --red:        #ef4444;
      --orange:     #f59e0b;
      --font-mono:  'JetBrains Mono', monospace;
      --font-body:  'DM Sans', sans-serif;
      --safe-top:   env(safe-area-inset-top, 0px);
      --safe-bot:   env(safe-area-inset-bottom, 0px);
    }
    html, body {
      height: 100%; background: var(--bg);
      color: var(--text); font-family: var(--font-body);
      overflow: hidden; -webkit-tap-highlight-color: transparent;
    }
    button { font-family: var(--font-body); cursor: pointer; border: none; outline: none; }
    input  { font-family: var(--font-body); outline: none; }

    /* ── App Shell ────────────────────────────────────────────── */
    #app { height: 100dvh; display: flex; flex-direction: column; position: relative; overflow: hidden; }

    /* ── Screens ──────────────────────────────────────────────── */
    .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .screen.active { display: flex; }

    /* ── Header ───────────────────────────────────────────────── */
    .app-header {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      padding: calc(var(--safe-top) + 14px) 16px 14px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; z-index: 10;
    }
    .logo-wrap {}
    .logo-text {
      font-family: var(--font-mono); font-size: 17px; font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-sub { font-size: 9px; color: var(--text-dim); letter-spacing: 3px; margin-top: 1px; }
    .plan-badge {
      font-size: 10px; font-weight: 700; font-family: var(--font-mono);
      padding: 4px 12px; border-radius: 20px; border: 1px solid;
    }

    /* ── Scroll Area ──────────────────────────────────────────── */
    .scroll-area {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px calc(80px + var(--safe-bot));
    }

    /* ── Tab Bar ──────────────────────────────────────────────── */
    .tab-bar {
      display: flex; background: var(--bg-panel);
      border-top: 1px solid var(--border);
      padding-bottom: var(--safe-bot);
      flex-shrink: 0; z-index: 20;
    }
    .tab-btn {
      flex: 1; background: none; display: flex; flex-direction: column;
      align-items: center; gap: 2px; padding: 10px 0 6px;
      position: relative;
    }
    .tab-btn .tab-icon { font-size: 20px; line-height: 1; }
    .tab-btn .tab-label { font-size: 10px; font-weight: 600; color: var(--text-dim); transition: color .2s; }
    .tab-btn.active .tab-label { color: var(--blue); }
    .tab-btn::after {
      content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
      width: 0; height: 2px; background: var(--blue); border-radius: 1px;
      transition: width .2s;
    }
    .tab-btn.active::after { width: 20px; }

    /* ── Signal Card ──────────────────────────────────────────── */
    .signal-card {
      background: var(--bg-card); border-radius: 14px; padding: 16px;
      margin-bottom: 12px; border: 1px solid var(--border-blue);
      position: relative; overflow: hidden;
      transition: transform .15s, box-shadow .15s;
      cursor: pointer;
    }
    .signal-card:active { transform: scale(0.98); }
    .signal-card.closed { opacity: .72; border-color: var(--border); }
    .signal-card.locked { cursor: default; }
    .card-top-line {
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
    }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .card-symbol-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
    .card-symbol { font-family: var(--font-mono); font-size: 18px; font-weight: 800; letter-spacing: 1px; }
    .bias-badge {
      font-size: 11px; font-weight: 700; padding: 2px 8px;
      border-radius: 20px; border: 1px solid;
    }
    .card-date { font-size: 11px; color: var(--text-dim); }
    .score-circle {
      width: 46px; height: 46px; border-radius: 50%; border: 2px solid;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--bg-card); flex-shrink: 0;
    }
    .score-num   { font-size: 14px; font-weight: 800; line-height: 1; font-family: var(--font-mono); }
    .score-label { font-size: 7px; color: var(--text-muted); text-transform: uppercase; margin-top: 1px; }

    /* ── Locked Bar ───────────────────────────────────────────── */
    .locked-bar {
      height: 64px; background: var(--bg-panel); border-radius: 8px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border: 1px dashed var(--border); gap: 4px;
    }
    .locked-bar-text { font-size: 11px; color: var(--text-dim); }

    /* ── Price Bar ────────────────────────────────────────────── */
    .price-bar-wrap { padding: 18px 4px 0; }
    .price-bar-track-area { position: relative; height: 28px; }
    .pb-track {
      position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%);
      height: 6px; background: var(--border); border-radius: 3px;
    }
    /* Static background gradient (stop → tp range) */
    .pb-grad {
      position: absolute; top: 50%; transform: translateY(-50%);
      height: 6px; border-radius: 3px;
    }
    /* Dynamic fill: entry → current price */
    .pb-fill {
      position: absolute; top: 50%; transform: translateY(-50%);
      height: 6px; border-radius: 3px;
      transition: width .6s cubic-bezier(.4,0,.2,1), left .6s cubic-bezier(.4,0,.2,1), background .6s;
      z-index: 1;
    }
    .pb-entry-zone {
      position: absolute; top: 50%; transform: translateY(-50%);
      height: 10px; background: #fde04730; border-radius: 2px;
    }
    .pb-dot {
      position: absolute; width: 14px; height: 14px;
      top: 50%; transform: translate(-50%, -50%);
      border: 2px solid var(--bg-card); z-index: 2;
      transition: box-shadow .4s, background .4s;
    }
    .pb-dot.circle { border-radius: 50%; }
    .pb-dot.square { border-radius: 3px; }
    /* TP check overlay inside dot */
    .pb-dot-check {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: 7px; font-weight: 900; color: var(--bg); z-index: 1;
      opacity: 0; transition: opacity .3s;
    }
    .pb-dot.hit .pb-dot-check { opacity: 1; }
    .pb-dot.hit { border-color: transparent !important; }

    /* Pulse ring on TP hit */
    .pb-dot-ring {
      position: absolute; inset: -5px; border-radius: 50%; border: 2px solid;
      opacity: 0; pointer-events: none;
      animation: none;
    }
    .pb-dot.hit .pb-dot-ring { opacity: .5; animation: tpPulse 1.8s ease-in-out infinite; }
    @keyframes tpPulse { 0%,100%{transform:scale(1);opacity:.5} 50%{transform:scale(1.5);opacity:0} }

    .pb-needle {
      position: absolute; top: 0; bottom: 0; width: 2px;
      background: #fff; transform: translateX(-50%); z-index: 3;
      box-shadow: 0 0 6px #ffffff99;
      transition: left .6s cubic-bezier(.4,0,.2,1);
    }
    .pb-needle-label {
      position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
      background: #fff; color: #000; font-size: 8px; font-weight: 700;
      padding: 2px 5px; border-radius: 3px; white-space: nowrap;
      font-family: var(--font-mono);
    }
    .pb-labels { position: relative; height: 40px; margin-top: 4px; }
    .pb-label {
      position: absolute; transform: translateX(-50%);
      text-align: center; white-space: nowrap;
      transition: color .4s;
    }
    .pb-label-name  { font-size: 9px; font-weight: 700; line-height: 1.3; font-family: var(--font-mono); }
    .pb-label-value { font-size: 8px; color: var(--text-muted); line-height: 1.3; font-family: var(--font-mono); }

    /* ── Status Bar (trade lifecycle) ────────────────────────── */
    .trade-status-bar {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px; padding: 8px 12px; border-radius: 10px;
      border: 1px solid; transition: all .4s;
    }
    .trade-status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      animation: statusPulse 2s infinite;
    }
    @keyframes statusPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
    .trade-status-dot.static { animation: none; }
    .trade-status-text { font-size: 12px; font-weight: 700; flex: 1; }
    .trade-status-price { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }

    /* ── TP milestone badges ─────────────────────────────────── */
    .tp-milestones { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .tp-milestone {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 20px; border: 1px solid;
      font-size: 10px; font-weight: 700; font-family: var(--font-mono);
      transition: all .3s;
    }
    .tp-milestone.pending { opacity: .35; filter: grayscale(.8); }
    .tp-milestone.hit {
      animation: tpBadgeGlow .6s ease forwards;
    }
    @keyframes tpBadgeGlow {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); box-shadow: 0 0 14px currentColor; }
      100% { transform: scale(1); }
    }

    /* ── Chips ────────────────────────────────────────────────── */
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .chip {
      font-size: 10px; font-weight: 600; padding: 2px 8px;
      border-radius: 20px; border: 1px solid;
    }

    /* ── Closed Badge ─────────────────────────────────────────── */
    .closed-badge {
      display: inline-flex; align-items: center;
      padding: 4px 10px; border-radius: 6px; border: 1px solid;
      font-size: 11px; font-weight: 700; margin-bottom: 8px;
    }

    /* ── List Header ──────────────────────────────────────────── */
    .list-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .list-header-text { font-size: 13px; color: var(--text-muted); }
    .list-header-date { font-size: 11px; color: var(--text-dim); }
    .dot-live { color: var(--green); font-weight: 700; }

    /* ── Empty State ──────────────────────────────────────────── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      padding-top: 60px; gap: 10px;
    }
    .empty-icon  { font-size: 40px; }
    .empty-text  { font-size: 15px; color: var(--text-muted); font-weight: 600; }
    .empty-sub   { font-size: 12px; color: var(--text-dim); }

    /* ── Loading ──────────────────────────────────────────────── */
    .loading-wrap {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; flex: 1; gap: 14px;
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--blue); border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: var(--text-muted); }

    /* ── Login Screen ─────────────────────────────────────────── */
    #screen-login {
      align-items: center; justify-content: center;
      padding: 24px; background: var(--bg);
    }
    .login-logo-area { text-align: center; margin-bottom: 36px; }
    .login-logo { font-family: var(--font-mono); font-size: 30px; font-weight: 800; color: var(--blue); letter-spacing: 3px; }
    .login-logo-sub { font-size: 10px; color: var(--text-dim); letter-spacing: 4px; margin-top: 3px; }
    .login-card {
      width: 100%; max-width: 400px; background: var(--bg-card);
      border-radius: 16px; padding: 24px;
      border: 1px solid var(--border-blue);
    }
    .login-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 20px; }
    .form-group  { margin-bottom: 16px; }
    .form-label  {
      display: block; font-size: 11px; font-weight: 600;
      color: var(--text-muted); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .form-input {
      width: 100%; background: var(--bg-input); border-radius: 10px;
      padding: 12px 14px; color: var(--text); font-size: 15px;
      border: 1px solid var(--border);
      transition: border-color .2s;
    }
    .form-input:focus { border-color: var(--blue); }
    .form-input::placeholder { color: var(--text-dim); }
    .btn-primary {
      width: 100%; background: var(--blue); border-radius: 10px;
      padding: 14px; color: #fff; font-size: 16px; font-weight: 700;
      margin-top: 8px; transition: opacity .2s;
    }
    .btn-primary:active { opacity: .8; }
    .btn-primary:disabled { opacity: .5; }
    .btn-switch {
      width: 100%; background: none; color: var(--blue);
      font-size: 13px; padding: 14px; margin-top: 4px;
    }
    .error-msg {
      background: #7f1d1d22; border: 1px solid #ef444444;
      border-radius: 8px; padding: 10px 12px;
      color: var(--red); font-size: 12px; margin-bottom: 12px;
      display: none;
    }
    .error-msg.show { display: block; }

    /* ── Detail Sheet (modal) ─────────────────────────────────── */
    .sheet-overlay {
      display: none; position: fixed; inset: 0;
      background: #000000cc; z-index: 100;
      align-items: flex-end;
    }
    .sheet-overlay.open { display: flex; }
    .sheet {
      background: var(--bg-panel); border-radius: 20px 20px 0 0;
      width: 100%; max-height: 88dvh; overflow-y: auto;
      padding: 0 20px calc(32px + var(--safe-bot));
      border: 1px solid var(--border-blue); border-bottom: none;
      animation: slideUp .28s cubic-bezier(.32,.72,0,1);
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-handle {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 14px auto 20px;
    }
    .sheet-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .sheet-symbol { font-family: var(--font-mono); font-size: 24px; font-weight: 800; letter-spacing: 1px; }
    .sheet-date   { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .detail-map-card {
      background: var(--bg-card); border-radius: 12px;
      padding: 14px; margin-bottom: 14px;
      border: 1px solid var(--border-blue);
    }
    .detail-map-title {
      font-size: 10px; color: var(--text-dim); font-weight: 700;
      letter-spacing: 1px; margin-bottom: 8px;
      text-transform: uppercase;
    }
    .data-card {
      background: var(--bg-card); border-radius: 12px;
      overflow: hidden; margin-bottom: 14px;
      border: 1px solid var(--border);
    }
    .data-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 11px 14px; border-bottom: 1px solid var(--border);
    }
    .data-row:last-child { border-bottom: none; }
    .data-label { font-size: 13px; color: var(--text-muted); }
    .data-value { font-size: 13px; font-weight: 700; font-family: var(--font-mono); }
    .notes-card {
      background: var(--bg-card); border-radius: 12px;
      padding: 14px; margin-bottom: 14px;
      border: 1px solid var(--border-blue);
    }
    .notes-title {
      font-size: 10px; color: var(--text-dim); font-weight: 700;
      letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase;
    }
    .notes-text { font-size: 12px; color: var(--text-muted); line-height: 1.7; }

    /* ── Plans Screen ─────────────────────────────────────────── */
    .screen-title { font-size: 22px; font-weight: 800; color: var(--text); }
    .screen-sub   { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .plan-card {
      background: var(--bg-card); border-radius: 14px; padding: 16px;
      margin-bottom: 14px; border: 1px solid var(--border);
      position: relative; overflow: hidden;
    }
    .plan-card.active-plan { box-shadow: 0 0 24px #3b82f622; }
    .plan-active-banner {
      position: absolute; top: 0; right: 0;
      padding: 3px 10px; border-bottom-left-radius: 8px;
      font-size: 9px; font-weight: 800; color: var(--bg); letter-spacing: 1px;
    }
    .plan-card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .plan-name  { font-size: 18px; font-weight: 800; }
    .plan-price { font-size: 16px; font-weight: 700; color: var(--text); }
    .plan-feature { display: flex; gap: 8px; margin-bottom: 5px; align-items: flex-start; }
    .plan-check { font-size: 12px; font-weight: 700; margin-top: 1px; }
    .plan-feat-text { font-size: 12px; color: var(--text-muted); }
    .btn-subscribe {
      width: 100%; margin-top: 14px; border-radius: 10px;
      padding: 12px; font-size: 14px; font-weight: 700;
      border: 1px solid; background: none; transition: opacity .2s;
    }
    .btn-subscribe:active { opacity: .7; }
    .plans-note { font-size: 12px; color: var(--text-dim); text-align: center; line-height: 1.6; margin-top: 8px; }

    /* ── Profile Screen ───────────────────────────────────────── */
    .profile-avatar-area { text-align: center; padding: 28px 0 20px; }
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--bg-card); border: 2px solid;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 800; margin-bottom: 10px;
    }
    .profile-name  { font-size: 18px; font-weight: 700; color: var(--text); }
    .profile-email { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .profile-plan-badge {
      display: inline-block; padding: 4px 14px; border-radius: 20px;
      border: 1px solid; font-size: 12px; font-weight: 700; margin-top: 8px;
    }
    .section-label {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1px;
      margin: 20px 0 8px;
    }
    .info-card {
      background: var(--bg-card); border-radius: 12px;
      overflow: hidden; border: 1px solid var(--border);
    }
    .info-row {
      display: flex; justify-content: space-between;
      padding: 11px 14px; border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row-label { color: var(--text-muted); }
    .info-row-value { color: var(--text); font-weight: 500; }
    .btn-logout {
      width: 100%; margin-top: 20px; background: #ef444415;
      border: 1px solid #ef444433; border-radius: 12px;
      padding: 14px; color: var(--red); font-size: 15px; font-weight: 700;
    }
    .app-version { text-align: center; color: var(--text-dim); font-size: 11px; margin-top: 20px; }

    /* ── Refresh indicator ────────────────────────────────────── */
    .refresh-bar {
      display: flex; justify-content: center; align-items: center;
      gap: 6px; padding: 6px; font-size: 11px; color: var(--text-dim);
    }
    .refresh-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Toast ────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: calc(80px + var(--safe-bot) + 12px);
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--bg-card); color: var(--text);
      border: 1px solid var(--border-blue);
      padding: 10px 18px; border-radius: 30px;
      font-size: 13px; font-weight: 600;
      opacity: 0; transition: all .3s; pointer-events: none; z-index: 200;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Scrollbar hide ───────────────────────────────────────── */
    .scroll-area::-webkit-scrollbar { display: none; }
    .sheet::-webkit-scrollbar { display: none; }

    /* ── Animations ───────────────────────────────────────────── */
    .fade-in { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    /* ── Install banner ───────────────────────────────────────── */
    .install-banner {
      display: none; background: var(--blue-dark);
      border-bottom: 1px solid var(--blue);
      padding: 10px 16px; align-items: center; gap: 10px;
      font-size: 13px;
    }
    .install-banner.show { display: flex; }
    .install-banner-text { flex: 1; color: var(--text); }
    .btn-install {
      background: var(--blue); color: #fff;
      padding: 6px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 700; white-space: nowrap;
    }

      50%      { box-shadow: 0 0 14px #22c55e44; }
    }

  </style>

<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════
const API = 'https://ouengine-api.onrender.com';

const PLAN_ORDER  = { free:0, level1:1, level2:2, level3:3 };
const PLAN_COLORS = { free:'#6b7280', level1:'#3b82f6', level2:'#8b5cf6', level3:'#f59e0b' };
const PLAN_LABELS = { free:'FREE', level1:'PLANO 1', level2:'PLANO 2', level3:'PLANO 3' };

const MODE_LABELS = { SCL:'SCALP', DTD:'DAY TRADE', SWG:'SWING' };
const MODE_COLORS = { SCL:'#f59e0b', DTD:'#3b82f6', SWG:'#8b5cf6' };

// ══════════════════════════════════════════════════════════════
//  TRADE STATUS ENGINE
//  Calcula o status do trade e quais TPs foram atingidos
//  com base no preço atual, puramente no frontend.
// ══════════════════════════════════════════════════════════════

/**
 * Retorna o status calculado do trade dado o sinal + preço atual.
 * Usado para rendering e para detectar transições de estado.
 *
 * @returns {
 *   status: 'waiting'|'active'|'tp1'|'tp2'|'tp3'|'stop'|'invalid',
 *   tp1_hit: bool, tp2_hit: bool, tp3_hit: bool,
 *   entry_executed: bool,
 *   fill: { direction: 'profit'|'loss'|null, leftPct: number, widthPct: number }
 * }
 */
function calcTradeState(signal, price) {
  const { bias, stop_loss, entry_min, entry_max, tp1, tp2, tp3 } = signal;
  const isShort = bias === -1;

  // Sem preço → aguardando
  if (price == null) {
    return { status:'waiting', tp1_hit:false, tp2_hit:false, tp3_hit:false, entry_executed:false, fill:null };
  }

  const entryMin = entry_min;
  const entryMax = entry_max;
  const entryMid = (entryMin + entryMax) / 2;

  // Dentro da zona de entrada?
  const inEntry = price >= entryMin && price <= entryMax;

  // ── ANTES DE ATIVAR: verificar invalidade ──────────────────
  // SHORT inválido: preço subiu acima do stop antes de entrar na zona
  // LONG inválido:  preço caiu abaixo do stop antes de entrar na zona
  // Só marca inválido se o trade ainda não tinha sido ativado antes
  const prevActivated = signal._activated || false;

  if (!prevActivated) {
    if (isShort && price > stop_loss) return { status:'invalid', tp1_hit:false, tp2_hit:false, tp3_hit:false, entry_executed:false, fill:null };
    if (!isShort && price < stop_loss) return { status:'invalid', tp1_hit:false, tp2_hit:false, tp3_hit:false, entry_executed:false, fill:null };
  }

  // ── VERIFICAR SE ENTRADA FOI EXECUTADA ────────────────────
  const entry_executed = inEntry || signal._activated || false;

  // Se ainda não entrou na zona, está aguardando
  if (!entry_executed) {
    return { status:'waiting', tp1_hit:false, tp2_hit:false, tp3_hit:false, entry_executed:false, fill:null };
  }

  // A partir daqui o trade está ATIVO (ou encerrado)
  // ── VERIFICAR TPs ATINGIDOS (retroativo) ──────────────────
  let tp1_hit = false, tp2_hit = false, tp3_hit = false;

  if (isShort) {
    // SHORT: preço cai → TPs abaixo do entry
    if (tp1 != null && price <= tp1) tp1_hit = true;
    if (tp2 != null && price <= tp2) tp2_hit = true;
    if (tp3 != null && price <= tp3) tp3_hit = true;

    // Retroativo: se tp2 foi atingido, tp1 também foi
    if (tp2_hit) tp1_hit = true;
    if (tp3_hit) { tp1_hit = true; tp2_hit = true; }
  } else {
    // LONG: preço sobe → TPs acima do entry
    if (tp1 != null && price >= tp1) tp1_hit = true;
    if (tp2 != null && price >= tp2) tp2_hit = true;
    if (tp3 != null && price >= tp3) tp3_hit = true;

    // Retroativo
    if (tp2_hit) tp1_hit = true;
    if (tp3_hit) { tp1_hit = true; tp2_hit = true; }
  }

  // ── VERIFICAR ENCERRAMENTO ────────────────────────────────
  // TP3 atingido → encerrado com lucro total
  if (tp3_hit) {
    return { status:'tp3', tp1_hit:true, tp2_hit:true, tp3_hit:true, entry_executed:true, fill:buildFill(signal, price, 'profit') };
  }

  // STOP atingido (após entrada)
  if (isShort && price >= stop_loss) {
    return { status:'stop', tp1_hit, tp2_hit, tp3_hit, entry_executed:true, fill:buildFill(signal, price, 'loss') };
  }
  if (!isShort && price <= stop_loss) {
    return { status:'stop', tp1_hit, tp2_hit, tp3_hit, entry_executed:true, fill:buildFill(signal, price, 'loss') };
  }

  // TP2 atingido mas aberto (sem TP3)
  if (tp2_hit) {
    return { status:'tp2', tp1_hit, tp2_hit, tp3_hit:false, entry_executed:true, fill:buildFill(signal, price, 'profit') };
  }
  // TP1 atingido mas aberto
  if (tp1_hit) {
    return { status:'tp1', tp1_hit, tp2_hit:false, tp3_hit:false, entry_executed:true, fill:buildFill(signal, price, 'profit') };
  }

  // Ativo em direção favorável (entre entry e tp1)
  const towardProfit = isShort ? price < entryMid : price > entryMid;
  const dir = towardProfit ? 'profit' : 'loss';

  return { status:'active', tp1_hit:false, tp2_hit:false, tp3_hit:false, entry_executed:true, fill:buildFill(signal, price, dir) };
}

/**
 * Calcula a faixa de preenchimento dinâmico da barra (entry → preço atual).
 * Retorna { leftPct, widthPct, direction } no espaço normalizado [0,100].
 */
function buildFill(signal, price, direction) {
  const { bias, stop_loss, entry_min, entry_max, tp1, tp2, tp3 } = signal;
  const entryMid = (entry_min + entry_max) / 2;

  const allVals = [stop_loss, entry_min, entry_max, tp1, tp2, tp3, price].filter(v => v != null);
  const minVal  = Math.min(...allVals);
  const range   = Math.max(...allVals) - minVal || 1;
  const pct     = v => ((v - minVal) / range * 100);

  const fromPct  = pct(entryMid);
  const toPct    = pct(price);
  const leftPct  = Math.min(fromPct, toPct);
  const widthPct = Math.abs(toPct - fromPct);

  return { leftPct, widthPct, direction };
}

// ── STATUS UI CONFIG ──────────────────────────────────────────
function getStatusUI(status, tp1_hit, tp2_hit) {
  const configs = {
    waiting: { label:'⏳ Aguardando entrada',         color:'#64748b', pulse:true },
    active:  { label:'✅ OPERAÇÃO ATIVA',              color:'#22c55e', pulse:true },
    tp1:     { label:'🎯 TP1 Atingido — Trade aberto', color:'#4ade80', pulse:false },
    tp2:     { label:'🎯 TP2 Atingido — Trade aberto', color:'#22c55e', pulse:false },
    tp3:     { label:'🏆 TP3 — Take Profit Final!',    color:'#10b981', pulse:false },
    stop:    { label:'🛑 Stop Loss Atingido',           color:'#ef4444', pulse:false },
    invalid: { label:'❌ Inválido — Stop antes da entrada', color:'#ef444488', pulse:false },
  };
  return configs[status] || configs.waiting;
}

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let state = {
  token:   localStorage.getItem('ou_token') || null,
  user:    JSON.parse(localStorage.getItem('ou_user') || 'null'),
  signals: [],
  history: [],
  // Guarda estado anterior dos trades para detectar transições
  // { [signalId]: { activated: bool, tp1_hit: bool, tp2_hit: bool, tp3_hit: bool, stop_hit: bool } }
  tradeStates: {},
};

// ══════════════════════════════════════════════════════════════
//  API HELPERS
// ══════════════════════════════════════════════════════════════
async function apiFetch(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  const res  = await fetch(API + path, { ...opts, headers });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Erro desconhecido');
  return data;
}

// ══════════════════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════════════════
let loginMode = 'login';

function setLoginMode(mode) {
  loginMode = mode;
  const isReg = mode === 'register';
  document.getElementById('login-title').textContent  = isReg ? 'Criar conta' : 'Entrar na conta';
  document.getElementById('field-name').style.display = isReg ? 'block' : 'none';
  document.getElementById('btn-auth').textContent      = isReg ? 'Criar conta' : 'Entrar';
  document.getElementById('btn-switch-mode').textContent = isReg
    ? 'Já tem conta? Entrar'
    : 'Não tem conta? Cadastre-se grátis';
  document.getElementById('input-password').autocomplete = isReg ? 'new-password' : 'current-password';
  hideError();
}

document.getElementById('btn-switch-mode').addEventListener('click', () => {
  setLoginMode(loginMode === 'login' ? 'register' : 'login');
});

document.getElementById('btn-auth').addEventListener('click', doAuth);
['input-email','input-password','input-name'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doAuth(); });
});

async function doAuth() {
  const email    = document.getElementById('input-email').value.trim().toLowerCase();
  const password = document.getElementById('input-password').value;
  const name     = document.getElementById('input-name').value.trim();
  const btn      = document.getElementById('btn-auth');

  if (!email || !password) { showError('Preencha e-mail e senha.'); return; }
  if (loginMode === 'register' && !name) { showError('Preencha seu nome.'); return; }

  btn.disabled = true; btn.textContent = '...';
  hideError();

  try {
    let data;
    if (loginMode === 'login') {
      data = await apiFetch('/auth/login', { method:'POST', body: JSON.stringify({email,password}) });
    } else {
      data = await apiFetch('/auth/register', { method:'POST', body: JSON.stringify({name,email,password}) });
      data = await apiFetch('/auth/login', { method:'POST', body: JSON.stringify({email,password}) });
    }
    state.token = data.token;
    state.user  = data.user;
    localStorage.setItem('ou_token', data.token);
    localStorage.setItem('ou_user',  JSON.stringify(data.user));
    enterApp();
  } catch(e) {
    showError(e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = loginMode === 'login' ? 'Entrar' : 'Criar conta';
  }
}

function showError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.classList.add('show');
}
function hideError() {
  document.getElementById('login-error').classList.remove('show');
}

// ══════════════════════════════════════════════════════════════
//  APP INIT
// ══════════════════════════════════════════════════════════════
function enterApp() {
  showScreen('main');
  updateHeader();
  renderPlans();
  renderProfile();
  loadSignals();
  setInterval(loadSignals, 15 * 1000);
}

function showScreen(name) {
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-main').classList.remove('active');
  document.getElementById(`screen-${name}`).classList.add('active');
}

function updateHeader() {
  const plan  = state.user?.plan || 'free';
  const color = PLAN_COLORS[plan];
  const badge = document.getElementById('header-plan-badge');
  badge.textContent = PLAN_LABELS[plan];
  badge.style.color            = color;
  badge.style.borderColor      = color + '66';
  badge.style.backgroundColor  = color + '22';
}

// ══════════════════════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  ['signals','history','plans','profile'].forEach(t => {
    const el = document.getElementById(`tab-${t}`);
    el.classList.toggle('active', t === tab);
    el.style.display = t === tab ? 'flex' : 'none';
  });
  if (tab === 'history' && state.history.length === 0) loadHistory();
}

document.addEventListener('DOMContentLoaded', () => {
  ['history','plans','profile'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = 'none';
  });
});

// ══════════════════════════════════════════════════════════════
//  SIGNALS — LOAD & PROCESS
// ══════════════════════════════════════════════════════════════
async function loadSignals() {
  try {
    const fresh = await apiFetch('/signals/active');

    // ── Enriquecer cada sinal com estado calculado ──────────
    fresh.forEach(signal => {
      const prev = state.tradeStates[signal.id] || {};

      // Carregar o flag _activated do estado salvo
      signal._activated = prev.activated || false;

      const price = signal.current_price;
      const calc  = calcTradeState(signal, price);

      // Se entrou na zona de entrada agora, setar _activated = true
      if (calc.entry_executed) {
        signal._activated = true;
        state.tradeStates[signal.id] = {
          ...prev,
          activated: true,
        };
      }

      // ── Detectar novas transições e disparar toasts ──────
      if (!signal.closed) {
        if (calc.status === 'active' && !prev.activated) {
          showToast(`🟢 ${signal.symbol} — Entrada executada!`);
        }
        if (calc.tp1_hit && !prev.tp1_hit) {
          showToast(`🎯 ${signal.symbol} — TP1 Atingido!`);
          state.tradeStates[signal.id] = { ...state.tradeStates[signal.id], tp1_hit: true };
        }
        if (calc.tp2_hit && !prev.tp2_hit) {
          showToast(`🎯 ${signal.symbol} — TP2 Atingido!`);
          state.tradeStates[signal.id] = { ...state.tradeStates[signal.id], tp2_hit: true };
        }
        if (calc.tp3_hit && !prev.tp3_hit) {
          showToast(`🏆 ${signal.symbol} — TP3! Take Profit Final!`);
          state.tradeStates[signal.id] = { ...state.tradeStates[signal.id], tp3_hit: true };
        }
        if (calc.status === 'stop' && !prev.stop_hit) {
          showToast(`🛑 ${signal.symbol} — Stop atingido.`);
          state.tradeStates[signal.id] = { ...state.tradeStates[signal.id], stop_hit: true };
        }
      }

      // Salvar o estado calculado no signal para uso no render
      signal._calc = calc;
    });

    state.signals = fresh;
    renderSignals();
  } catch(e) {
    document.getElementById('signals-list').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-text">Erro ao carregar sinais</div>
        <div class="empty-sub">${e.message}</div>
        <button onclick="loadSignals()" style="margin-top:14px;background:var(--blue);color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700">Tentar novamente</button>
      </div>`;
  }
}

function renderSignals() {
  const container = document.getElementById('signals-list');
  const active    = state.signals.filter(s => !s.closed);

  let html = `
    <div class="refresh-bar">
      <div class="refresh-dot"></div>
      <span>Preço atualizado a cada 15 segundos</span>
    </div>
    <div class="list-header">
      <div class="list-header-text"><span class="dot-live">● </span>${active.length} sinais ativos</div>
      <div class="list-header-date">${new Date().toLocaleDateString('pt-BR')}</div>
    </div>`;

  if (state.signals.length === 0) {
    html += `<div class="empty-state">
      <div class="empty-icon">📡</div>
      <div class="empty-text">Nenhum sinal ativo</div>
      <div class="empty-sub">Puxe para baixo para atualizar</div>
    </div>`;
  } else {
    state.signals.forEach(s => { html += buildSignalCard(s); });
  }

  container.innerHTML = html;
  container.querySelectorAll('.signal-card[data-id]').forEach(card => {
    card.addEventListener('click', () => openDetail(Number(card.dataset.id)));
  });
}

async function loadHistory() {
  try {
    const data = await apiFetch('/signals?closed=1&limit=50');
    state.history = data.data || [];
    renderHistory();
  } catch(e) {}
}

function renderHistory() {
  const container = document.getElementById('history-list');
  document.getElementById('history-subtitle').textContent = `${state.history.length} operações encerradas`;

  if (state.history.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-text">Nenhuma operação encerrada</div>
    </div>`;
    return;
  }

  let html = '';
  state.history.forEach(s => { html += buildSignalCard(s); });
  container.innerHTML = html;
  container.querySelectorAll('.signal-card[data-id]').forEach(card => {
    card.addEventListener('click', () => openDetail(Number(card.dataset.id)));
  });
}

// ══════════════════════════════════════════════════════════════
//  CARD BUILDER
// ══════════════════════════════════════════════════════════════
function buildSignalCard(signal) {
  const userPlan   = state.user?.plan || 'free';
  const accessible = canAccess(signal.plan_required, userPlan);
  const isShort    = signal.bias === -1;
  const scoreColor = signal.score >= 80 ? '#22c55e' : signal.score >= 65 ? '#facc15' : '#ef4444';
  const locked     = !accessible;

  // Badge de modo
  const mode      = signal.signal_mode || 'DTD';
  const modeColor = MODE_COLORS[mode] || '#3b82f6';
  const modeBadge = `<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;border:1px solid ${modeColor}44;background:${modeColor}18;color:${modeColor};font-family:var(--font-mono)">${MODE_LABELS[mode]||mode}</span>`;

  // ── Estado calculado do trade ──────────────────────────────
  const calc = signal._calc || calcTradeState(signal, signal.current_price);
  const { status, tp1_hit, tp2_hit, tp3_hit, entry_executed } = calc;
  const statusUI = getStatusUI(status);

  // ── Status bar visual ──────────────────────────────────────
  let statusBarHtml = '';
  if (accessible && !signal.closed) {
    statusBarHtml = `
      <div class="trade-status-bar" style="background:${statusUI.color}15;border-color:${statusUI.color}33">
        <div class="trade-status-dot ${statusUI.pulse ? '' : 'static'}" style="background:${statusUI.color}"></div>
        <span class="trade-status-text" style="color:${statusUI.color}">${statusUI.label}</span>
        ${signal.current_price
          ? `<span class="trade-status-price">Preço: ${fmtNum(signal.current_price)}</span>`
          : ''}
      </div>`;
  }

  // ── TP milestones ──────────────────────────────────────────
  let milestonesHtml = '';
  if (accessible && !signal.closed && entry_executed) {
    const hasAnyTp = signal.tp1 != null || signal.tp2 != null || signal.tp3 != null;
    if (hasAnyTp) {
      const tps = [];
      if (signal.tp1 != null) tps.push({ label:'TP1', hit: tp1_hit, color:'#4ade80' });
      if (signal.tp2 != null) tps.push({ label:'TP2', hit: tp2_hit, color:'#22c55e' });
      if (signal.tp3 != null) {
        tps.push({ label:'TP3', hit: tp3_hit, color:'#10b981' });
      } else {
        // TP3 ainda não existe — placeholder
        tps.push({ label:'TP3', hit: false, color:'#334155', placeholder: true });
      }

      milestonesHtml = `<div class="tp-milestones">` +
        tps.map(tp => {
          const style = tp.placeholder
            ? `color:#334155;border-color:#334155;background:transparent`
            : tp.hit
              ? `color:${tp.color};border-color:${tp.color}55;background:${tp.color}22`
              : `color:${tp.color}55;border-color:${tp.color}22;background:transparent`;
          const cls = tp.hit ? 'hit' : 'pending';
          const icon = tp.placeholder ? '—' : tp.hit ? '✓' : '○';
          return `<div class="tp-milestone ${cls}" style="${style}">${icon} ${tp.label}</div>`;
        }).join('') +
      `</div>`;
    }
  }

  // ── Fechado badge ──────────────────────────────────────────
  let closedBadge = '';
  if (signal.closed) {
    const { label, color } = closedBadgeInfo(signal.close_reason);
    closedBadge = `<div class="closed-badge" style="color:${color};border-color:${color}44;background:${color}11">${label}</div>`;
  }

  // ── Bias badge ─────────────────────────────────────────────
  let biasHtml = locked
    ? `<span class="bias-badge" style="color:var(--text-muted);border-color:var(--border);background:var(--bg-panel)">🔒 BLOQUEADO</span>`
    : `<span class="bias-badge" style="color:${isShort?'var(--red)':'var(--green)'};border-color:${isShort?'#ef444444':'#22c55e44'};background:${isShort?'#7f1d1d33':'#064e3b33'}">${isShort?'▼ SHORT':'▲ LONG'}</span>`;

  // ── Price bar ──────────────────────────────────────────────
  let barHtml = locked
    ? `<div class="locked-bar">
        <span style="font-size:20px">🔒</span>
        <span class="locked-bar-text">Disponível no <b style="color:${PLAN_COLORS[signal.plan_required]}">${PLAN_LABELS[signal.plan_required]}</b></span>
       </div>`
    : buildPriceBar(signal, calc);

  // ── Chips extras ───────────────────────────────────────────
  let chipsHtml = '';
  if (accessible) {
    const chips = [];
    if (signal.regime) chips.push(['var(--blue)', signal.regime]);
    if (entry_executed && !signal.closed) chips.push(['var(--purple)', 'ENTRADA EXEC.']);
    chipsHtml = chips.length
      ? `<div class="chips">${chips.map(([c,l]) =>
          `<span class="chip" style="color:${c};border-color:${c}33;background:${c}18">${l}</span>`
        ).join('')}</div>`
      : '';
  }

  // ── Card top accent line ───────────────────────────────────
  const topLineColor = signal.closed
    ? '#334155'
    : status === 'stop' ? '#ef4444'
    : (status === 'tp1' || status === 'tp2' || status === 'tp3') ? '#22c55e'
    : status === 'active' ? '#22c55e'
    : (isShort ? '#ef4444' : '#22c55e');

  const topLine = `<div class="card-top-line" style="background:${topLineColor}"></div>`;

  // Card glow for active trades
  const cardGlowClass = (!signal.closed && status === 'active') ? 'trade-active' : '';

  return `
    <div class="signal-card fade-in ${signal.closed?'closed':''} ${locked?'locked':''} ${cardGlowClass}"
         ${accessible ? `data-id="${signal.id}"` : ''}>
      ${topLine}
      <div class="card-header">
        <div>
          <div class="card-symbol-row">
            <span class="card-symbol">${signal.symbol}</span>
            ${biasHtml}
            ${modeBadge}
          </div>
          <div class="card-date">${signal.signal_date}</div>
        </div>
        <div class="score-circle" style="border-color:${scoreColor};box-shadow:0 0 10px ${scoreColor}33">
          <span class="score-num" style="color:${scoreColor}">${signal.score}</span>
          <span class="score-label">score</span>
        </div>
      </div>
      ${closedBadge}
      ${statusBarHtml}
      ${milestonesHtml}
      ${barHtml}
      ${chipsHtml}
    </div>`;
}

// ══════════════════════════════════════════════════════════════
//  PRICE BAR BUILDER (atualizado com fill dinâmico)
// ══════════════════════════════════════════════════════════════
function buildPriceBar(signal, calc) {
  const { bias, stop_loss, entry_min, entry_max, tp1, tp2, tp3 } = signal;
  const current = signal.current_price;
  const isShort = bias === -1;

  // Garantir que temos um calc
  if (!calc) calc = calcTradeState(signal, current);
  const { tp1_hit, tp2_hit, tp3_hit, fill } = calc;

  // Pontos para escala
  const allVals = [stop_loss, entry_min, entry_max, tp1, tp2, tp3, current].filter(v => v != null);
  const minVal  = Math.min(...allVals);
  const maxVal  = Math.max(...allVals);
  const range   = maxVal - minVal || 1;
  const pct     = v => ((v - minVal) / range * 100).toFixed(2);

  const entryMid  = (entry_min + entry_max) / 2;
  const lastTp    = tp3 ?? tp2 ?? tp1;

  // Gradiente de fundo (range completo: stop → lastTp)
  const gradLeft  = Math.min(parseFloat(pct(stop_loss)), parseFloat(pct(lastTp)));
  const gradWidth = Math.abs(parseFloat(pct(lastTp)) - parseFloat(pct(stop_loss)));
  const gradStyle = isShort
    ? `background:linear-gradient(to left,#ef444420,#10b98120)`
    : `background:linear-gradient(to right,#ef444420,#10b98120)`;

  // Zona de entrada
  const entryLeft  = parseFloat(pct(entry_min));
  const entryWidth = parseFloat(pct(entry_max)) - entryLeft;

  // ── Fill dinâmico (entry → preço atual) ───────────────────
  let fillHtml = '';
  if (fill && fill.widthPct > 0) {
    const fillColor = fill.direction === 'profit'
      ? 'linear-gradient(to right, #22c55e88, #10b98166)'
      : 'linear-gradient(to right, #ef444488, #dc262666)';
    // Ajustar direção do gradiente para SHORT
    const gradient = fill.direction === 'profit'
      ? (isShort
          ? 'linear-gradient(to left, #22c55e99, #10b98155)'
          : 'linear-gradient(to right, #22c55e55, #10b98199)')
      : (isShort
          ? 'linear-gradient(to left, #ef444455, #dc262699)'
          : 'linear-gradient(to right, #ef444455, #dc262699)');

    fillHtml = `<div class="pb-fill" style="left:${fill.leftPct.toFixed(2)}%;width:${fill.widthPct.toFixed(2)}%;background:${gradient};"></div>`;
  }

  // ── Pontos na barra ────────────────────────────────────────
  const points = [
    { label:'STOP',  value:stop_loss, color:'#ef4444', shape:'circle', hit:false },
    { label:'ENTRY', value:entryMid,  color:'#facc15', shape:'square', hit:false },
    { label:'TP1',   value:tp1,       color:'#4ade80', shape:'circle', hit:tp1_hit },
    ...(tp2 != null ? [{ label:'TP2', value:tp2, color:'#22c55e', shape:'circle', hit:tp2_hit }] : []),
    ...(tp3 != null
      ? [{ label:'TP3', value:tp3, color:'#10b981', shape:'circle', hit:tp3_hit }]
      : [{ label:'TP3', value:null, color:'#334155', shape:'circle', hit:false, placeholder:true }]
    ),
  ].filter(p => p.value != null || p.placeholder);

  const dotsHtml = points.filter(p => !p.placeholder && p.value != null).map(p => {
    const hitClass = p.hit ? 'hit' : '';
    const glow     = p.hit
      ? `box-shadow:0 0 14px ${p.color},0 0 4px #fff;`
      : `box-shadow:0 0 6px ${p.color}88;`;
    const checkHtml = p.hit && p.shape === 'circle'
      ? `<div class="pb-dot-check">✓</div><div class="pb-dot-ring" style="border-color:${p.color}"></div>`
      : '';
    return `<div class="pb-dot ${p.shape} ${hitClass}" style="left:${pct(p.value)}%;background:${p.hit ? p.color : p.color};${glow}">${checkHtml}</div>`;
  }).join('');

  // Agulha do preço atual
  const needleHtml = current != null
    ? `<div class="pb-needle" style="left:${pct(current)}%">
        <div class="pb-needle-label">▼ ${fmtNum(current)}</div>
       </div>`
    : '';

  // Labels com TP3 placeholder se não existir
  const labelsHtml = points.map(p => {
    if (p.placeholder) {
      // TP3 placeholder: posiciona além do TP2 no lado correto
      const tp2Val = tp2 ?? tp1;
      const offset = isShort
        ? tp2Val - (entry_min - stop_loss) * 0.15  // SHORT: esquerda
        : tp2Val + (entry_min - stop_loss) * 0.15; // LONG: direita (vai ficar fora às vezes — ok)
      // Usa posição relativa estimada, ou simplesmente oculta se não tiver tp2
      if (!tp2Val) return '';
      const pos = parseFloat(pct(tp2Val)) + (isShort ? -8 : 8);
      const clampedPos = Math.max(0, Math.min(95, pos));
      return `<div class="pb-label" style="left:${clampedPos}%">
        <div class="pb-label-name" style="color:#334155">TP3</div>
        <div class="pb-label-value" style="color:#334155">em breve</div>
      </div>`;
    }
    const nameStyle = p.hit
      ? `color:${p.color};text-shadow:0 0 8px ${p.color}88;`
      : `color:${p.color};`;
    const suffix = p.hit ? ' ✓' : '';
    return `<div class="pb-label" style="left:${pct(p.value)}%">
      <div class="pb-label-name" style="${nameStyle}">${p.label}${suffix}</div>
      <div class="pb-label-value">${fmtNum(p.value)}</div>
    </div>`;
  }).join('');

  return `
    <div class="price-bar-wrap">
      <div class="price-bar-track-area">
        <div class="pb-track"></div>
        <div class="pb-grad" style="left:${gradLeft}%;width:${gradWidth}%;${gradStyle}"></div>
        <div class="pb-entry-zone" style="left:${entryLeft}%;width:${entryWidth}%"></div>
        ${fillHtml}
        ${dotsHtml}
        ${needleHtml}
      </div>
      <div class="pb-labels">${labelsHtml}</div>
    </div>`;
}

// ══════════════════════════════════════════════════════════════
//  DETAIL SHEET
// ══════════════════════════════════════════════════════════════
async function openDetail(id) {
  const overlay = document.getElementById('sheet-overlay');
  const body    = document.getElementById('sheet-body');

  body.innerHTML = `<div class="loading-wrap" style="min-height:200px"><div class="spinner"></div></div>`;
  overlay.classList.add('open');

  try {
    const signal  = await apiFetch(`/signals/${id}`);
    const isShort = signal.bias === -1;

    // Reusar o _calc se já foi calculado, senão recalcular
    const existing = state.signals.find(s => s.id === id);
    if (existing?._activated) signal._activated = existing._activated;
    const calc = calcTradeState(signal, signal.current_price);
    signal._calc = calc;
    const { status, tp1_hit, tp2_hit, tp3_hit, entry_executed } = calc;
    const statusUI = getStatusUI(status);

    const rows = [
      { label:'Entrada mín.',  value: fmtNum(signal.entry_min),  color:'#facc15' },
      { label:'Entrada máx.',  value: fmtNum(signal.entry_max),  color:'#fde047' },
      { label:'Stop Loss',     value: fmtNum(signal.stop_loss),  color:'#ef4444' },
      { label:'Alvo 1 (TP1)', value: fmtNum(signal.tp1),         color:'#4ade80' },
      { label:'Alvo 2 (TP2)', value: fmtNum(signal.tp2),         color:'#22c55e' },
      { label:'Alvo 3 (TP3)', value: signal.tp3 != null ? fmtNum(signal.tp3) : '— em breve', color:'#10b981' },
      { label:'Score',         value: signal.score,               color: signal.score>=80?'#22c55e':'#facc15' },
      { label:'Regime',        value: signal.regime||'—',         color:'#3b82f6' },
      { label:'Ação KEO',      value: signal.keo_action||'—',     color: isShort?'#ef4444':'#22c55e' },
    ];

    const { label: clLabel, color: clColor } = closedBadgeInfo(signal.close_reason);
    const closedBadgeHtml = signal.closed
      ? `<div class="closed-badge" style="color:${clColor};border-color:${clColor}44;background:${clColor}11">${clLabel}</div>`
      : '';

    // Status bar no detalhe
    const statusDetailHtml = !signal.closed ? `
      <div class="trade-status-bar" style="background:${statusUI.color}15;border-color:${statusUI.color}33;margin-bottom:14px">
        <div class="trade-status-dot ${statusUI.pulse ? '' : 'static'}" style="background:${statusUI.color}"></div>
        <span class="trade-status-text" style="color:${statusUI.color}">${statusUI.label}</span>
        ${signal.current_price ? `<span class="trade-status-price">Preço: ${fmtNum(signal.current_price)}</span>` : ''}
      </div>` : '';

    // Milestones no detalhe
    let milestonesDetailHtml = '';
    if (!signal.closed && entry_executed) {
      const tpItems = [
        { label:'TP1', hit:tp1_hit, color:'#4ade80', has: signal.tp1 != null },
        { label:'TP2', hit:tp2_hit, color:'#22c55e', has: signal.tp2 != null },
        { label:'TP3', hit:tp3_hit, color:'#10b981', has: signal.tp3 != null, placeholder: signal.tp3 == null },
      ].filter(t => t.has || t.placeholder);

      if (tpItems.length) {
        milestonesDetailHtml = `<div class="tp-milestones" style="margin-bottom:14px">` +
          tpItems.map(tp => {
            const style = tp.placeholder
              ? `color:#334155;border-color:#334155;background:transparent`
              : tp.hit
                ? `color:${tp.color};border-color:${tp.color}55;background:${tp.color}22`
                : `color:${tp.color}55;border-color:${tp.color}22;background:transparent`;
            const cls = tp.hit ? 'hit' : 'pending';
            const icon = tp.placeholder ? '—' : tp.hit ? '✓' : '○';
            const txt  = tp.placeholder ? `${tp.label} (em breve)` : tp.label;
            return `<div class="tp-milestone ${cls}" style="${style}">${icon} ${txt}</div>`;
          }).join('') +
        `</div>`;
      }
    }

    body.innerHTML = `
      <div class="sheet-header">
        <div>
          <div class="sheet-symbol">${signal.symbol}</div>
          <div class="sheet-date">${signal.signal_date}</div>
        </div>
        <span class="bias-badge" style="color:${isShort?'#ef4444':'#22c55e'};border-color:${isShort?'#ef444466':'#22c55e66'};background:${isShort?'#7f1d1d33':'#064e3b33'}">
          ${isShort?'▼ SHORT':'▲ LONG'}
        </span>
      </div>
      ${closedBadgeHtml}
      ${statusDetailHtml}
      ${milestonesDetailHtml}
      <div class="detail-map-card">
        <div class="detail-map-title">MAPA DA OPERAÇÃO</div>
        ${buildPriceBar(signal, calc)}
      </div>
      <div class="data-card">
        ${rows.map(r => `
          <div class="data-row">
            <span class="data-label">${r.label}</span>
            <span class="data-value" style="color:${r.color}">${r.value}</span>
          </div>`).join('')}
      </div>
      ${signal.notes ? `
        <div class="notes-card">
          <div class="notes-title">ANÁLISE</div>
          <div class="notes-text">${signal.notes}</div>
        </div>` : ''}
      ${signal.events?.length ? `
        <div class="notes-card">
          <div class="notes-title">EVENTOS</div>
          ${signal.events.map(ev => `
            <div style="display:flex;gap:8px;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)">
              <span style="color:var(--blue)">●</span>
              <span style="color:var(--text);font-weight:600;flex:1">${ev.event_type}</span>
              <span style="color:var(--text-dim)">${new Date(ev.event_at).toLocaleString('pt-BR')}</span>
            </div>`).join('')}
        </div>` : ''}
    `;
  } catch(e) {
    body.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">${e.message}</div></div>`;
  }
}

document.getElementById('sheet-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeSheet();
});
function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
}

async function doLogout() {
  if (!confirm('Deseja sair da sua conta?')) return;
  try { await apiFetch('/auth/logout', {method:'POST'}); } catch(_) {}
  state.token = null; state.user = null;
  localStorage.removeItem('ou_token');
  localStorage.removeItem('ou_user');
  showScreen('login');
  setLoginMode('login');
}

// ══════════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════════
function canAccess(signalPlan, userPlan) {
  return (PLAN_ORDER[userPlan] ?? 0) >= (PLAN_ORDER[signalPlan] ?? 0);
}

function fmtNum(n) {
  if (n == null) return '—';
  if (n > 1000) return n.toLocaleString('pt-BR', {minimumFractionDigits:2,maximumFractionDigits:2});
  return Number(n).toFixed(n < 10 ? 4 : 2);
}

function closedBadgeInfo(reason) {
  if (reason === 'stop_after_tp1') return { label:'✓ TP1 → STOP', color:'#fbbf24' };
  if (reason === 'tp3')            return { label:'✓ TP1+TP2+TP3',color:'#10b981' };
  if (reason === 'tp2')            return { label:'✓ TP1+TP2',    color:'#22c55e' };
  if (reason === 'tp1')            return { label:'✓ TP1',         color:'#4ade80' };
  if (reason === 'stop')           return { label:'✕ STOP',        color:'#ef4444' };
  return { label:'ENCERRADO', color:'#6b7280' };
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ══════════════════════════════════════════════════════════════
//  PWA — INSTALL BANNER
// ══════════════════════════════════════════════════════════════
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});
document.getElementById('btn-install').addEventListener('click', () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('install-banner').classList.remove('show');
  });
});
document.getElementById('btn-dismiss').addEventListener('click', () => {
  document.getElementById('install-banner').classList.remove('show');
});

// ══════════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════════
if (state.token && state.user) {
  apiFetch('/auth/me').then(me => {
    state.user = me;
    localStorage.setItem('ou_user', JSON.stringify(me));
    enterApp();
  }).catch(() => {
    state.token = null; state.user = null;
    localStorage.removeItem('ou_token');
    localStorage.removeItem('ou_user');
  });
}
</script>

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(() => {});
}
</script>
