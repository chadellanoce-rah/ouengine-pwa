<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#060d1a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="OUEngine"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>OUEngine</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#060d1a; --bg-card:#0f172a; --bg-panel:#0b1629; --bg-input:#0d1f3c;
      --border:#1e293b; --border-blue:#1e3a5f;
      --text:#f1f5f9; --text-muted:#64748b; --text-dim:#334155;
      --blue:#3b82f6; --blue-dark:#1d4ed8; --purple:#8b5cf6;
      --yellow:#facc15; --green:#22c55e; --green-2:#10b981; --green-1:#4ade80;
      --red:#ef4444; --orange:#f59e0b;
      --font-mono:'JetBrains Mono',monospace; --font-body:'DM Sans',sans-serif;
      --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);overflow:hidden;-webkit-tap-highlight-color:transparent;}
    button{font-family:var(--font-body);cursor:pointer;border:none;outline:none;}
    input{font-family:var(--font-body);outline:none;}
    #app{height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;}
    .screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
    .screen.active{display:flex;}

    /* Header */
    .app-header{background:var(--bg-panel);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 14px) 16px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10;}
    .logo-text{font-family:var(--font-mono);font-size:17px;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .logo-sub{font-size:9px;color:var(--text-dim);letter-spacing:3px;margin-top:1px;}
    .plan-badge{font-size:10px;font-weight:700;font-family:var(--font-mono);padding:4px 12px;border-radius:20px;border:1px solid;}

    /* Scroll */
    .scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px 16px calc(80px + var(--safe-bot));}
    .scroll-area::-webkit-scrollbar{display:none;}

    /* Tab bar */
    .tab-bar{display:flex;background:var(--bg-panel);border-top:1px solid var(--border);padding-bottom:var(--safe-bot);flex-shrink:0;z-index:20;}
    .tab-btn{flex:1;background:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 0 6px;position:relative;}
    .tab-btn .tab-icon{font-size:20px;line-height:1;}
    .tab-btn .tab-label{font-size:10px;font-weight:600;color:var(--text-dim);transition:color .2s;}
    .tab-btn.active .tab-label{color:var(--blue);}
    .tab-btn::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--blue);border-radius:1px;transition:width .2s;}
    .tab-btn.active::after{width:20px;}

    /* Signal card */
    .signal-card{background:var(--bg-card);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border-blue);position:relative;overflow:hidden;transition:transform .15s;cursor:pointer;}
    .signal-card:active{transform:scale(.98);}
    .signal-card.closed{opacity:.72;border-color:var(--border);}
    .signal-card.locked{cursor:default;}
    .card-top-line{position:absolute;top:0;left:0;right:0;height:2px;}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
    .card-symbol-row{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap;}
    .card-symbol{font-family:var(--font-mono);font-size:18px;font-weight:800;letter-spacing:1px;}
    .card-date{font-size:11px;color:var(--text-dim);}
    .bias-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid;}
    .score-circle{width:46px;height:46px;border-radius:50%;border:2px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg-card);flex-shrink:0;}
    .score-num{font-size:14px;font-weight:800;line-height:1;font-family:var(--font-mono);}
    .score-label{font-size:7px;color:var(--text-muted);text-transform:uppercase;margin-top:1px;}

    /* Locked */
    .locked-bar{height:64px;background:var(--bg-panel);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px dashed var(--border);gap:4px;}

    /* Waiting (sem operation) */
    .waiting-card{padding:14px;background:var(--bg-panel);border-radius:8px;border:1px dashed var(--border);text-align:center;}

    /* Price bar */
    .price-bar-wrap{padding:18px 4px 0;}
    .price-bar-track-area{position:relative;height:28px;}
    .pb-track{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:6px;background:var(--border);border-radius:3px;}
    .pb-grad{position:absolute;top:50%;transform:translateY(-50%);height:6px;border-radius:3px;}
    .pb-fill{position:absolute;top:50%;transform:translateY(-50%);height:6px;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1),left .6s cubic-bezier(.4,0,.2,1);z-index:1;}
    .pb-entry-zone{position:absolute;top:50%;transform:translateY(-50%);height:10px;background:#fde04730;border-radius:2px;}
    .pb-dot{position:absolute;width:14px;height:14px;top:50%;transform:translate(-50%,-50%);border:2px solid var(--bg-card);z-index:2;}
    .pb-dot.circle{border-radius:50%;} .pb-dot.square{border-radius:3px;}
    .pb-dot-check{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:900;color:var(--bg);z-index:1;opacity:0;transition:opacity .3s;}
    .pb-dot.hit .pb-dot-check{opacity:1;} .pb-dot.hit{border-color:transparent !important;}
    .pb-dot-ring{position:absolute;inset:-5px;border-radius:50%;border:2px solid;opacity:0;pointer-events:none;}
    .pb-dot.hit .pb-dot-ring{opacity:.5;animation:tpPulse 1.8s ease-in-out infinite;}
    @keyframes tpPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.5);opacity:0}}
    .pb-needle{position:absolute;top:0;bottom:0;width:2px;background:#fff;transform:translateX(-50%);z-index:3;box-shadow:0 0 6px #ffffff99;transition:left .6s cubic-bezier(.4,0,.2,1);}
    .pb-needle-label{position:absolute;top:-20px;left:50%;transform:translateX(-50%);background:#fff;color:#000;font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;white-space:nowrap;font-family:var(--font-mono);}
    .pb-labels{position:relative;height:40px;margin-top:4px;}
    .pb-label{position:absolute;transform:translateX(-50%);text-align:center;white-space:nowrap;}
    .pb-label-name{font-size:9px;font-weight:700;line-height:1.3;font-family:var(--font-mono);}
    .pb-label-value{font-size:8px;color:var(--text-muted);line-height:1.3;font-family:var(--font-mono);}

    /* Trade status bar */
    .trade-status-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 12px;border-radius:10px;border:1px solid;}
    .trade-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .trade-status-dot.pulse{animation:statusPulse 2s infinite;}
    @keyframes statusPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
    .trade-status-text{font-size:12px;font-weight:700;flex:1;}
    .trade-status-price{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);}

    /* TP milestones */
    .tp-milestones{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
    .tp-milestone{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;border:1px solid;font-size:10px;font-weight:700;font-family:var(--font-mono);transition:all .3s;}
    .tp-milestone.pending{opacity:.35;}

    /* Chips */
    .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
    .chip{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;border:1px solid;}
    .closed-badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:6px;border:1px solid;font-size:11px;font-weight:700;margin-bottom:8px;}

    /* List header */
    .list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
    .list-header-text{font-size:13px;color:var(--text-muted);}
    .list-header-date{font-size:11px;color:var(--text-dim);}
    .dot-live{color:var(--green);font-weight:700;}

    /* Empty/Loading */
    .empty-state{display:flex;flex-direction:column;align-items:center;padding-top:60px;gap:10px;}
    .empty-icon{font-size:40px;} .empty-text{font-size:15px;color:var(--text-muted);font-weight:600;} .empty-sub{font-size:12px;color:var(--text-dim);}
    .loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{font-size:13px;color:var(--text-muted);}

    /* Login */
    #screen-login{align-items:center;justify-content:center;padding:24px;background:var(--bg);}
    .login-logo-area{text-align:center;margin-bottom:36px;}
    .login-logo{font-family:var(--font-mono);font-size:30px;font-weight:800;color:var(--blue);letter-spacing:3px;}
    .login-logo-sub{font-size:10px;color:var(--text-dim);letter-spacing:4px;margin-top:3px;}
    .login-card{width:100%;max-width:400px;background:var(--bg-card);border-radius:16px;padding:24px;border:1px solid var(--border-blue);}
    .login-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:20px;}
    .form-group{margin-bottom:16px;}
    .form-label{display:block;font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
    .form-input{width:100%;background:var(--bg-input);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;border:1px solid var(--border);transition:border-color .2s;}
    .form-input:focus{border-color:var(--blue);}
    .form-input::placeholder{color:var(--text-dim);}
    .btn-primary{width:100%;background:var(--blue);border-radius:10px;padding:14px;color:#fff;font-size:16px;font-weight:700;margin-top:8px;transition:opacity .2s;}
    .btn-primary:active{opacity:.8;} .btn-primary:disabled{opacity:.5;}
    .btn-switch{width:100%;background:none;color:var(--blue);font-size:13px;padding:14px;margin-top:4px;}
    .error-msg{background:#7f1d1d22;border:1px solid #ef444444;border-radius:8px;padding:10px 12px;color:var(--red);font-size:12px;margin-bottom:12px;display:none;}
    .error-msg.show{display:block;}

    /* Sheet */
    .sheet-overlay{display:none;position:fixed;inset:0;background:#000000cc;z-index:100;align-items:flex-end;}
    .sheet-overlay.open{display:flex;}
    .sheet{background:var(--bg-panel);border-radius:20px 20px 0 0;width:100%;max-height:88dvh;overflow-y:auto;padding:0 20px calc(32px + var(--safe-bot));border:1px solid var(--border-blue);border-bottom:none;animation:slideUp .28s cubic-bezier(.32,.72,0,1);}
    .sheet::-webkit-scrollbar{display:none;}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:14px auto 20px;}
    .sheet-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:18px;}
    .sheet-symbol{font-family:var(--font-mono);font-size:24px;font-weight:800;letter-spacing:1px;}
    .sheet-date{font-size:12px;color:var(--text-dim);margin-top:2px;}
    .detail-map-card{background:var(--bg-card);border-radius:12px;padding:14px;margin-bottom:14px;border:1px solid var(--border-blue);}
    .detail-map-title{font-size:10px;color:var(--text-dim);font-weight:700;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase;}
    .data-card{background:var(--bg-card);border-radius:12px;overflow:hidden;margin-bottom:14px;border:1px solid var(--border);}
    .data-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);}
    .data-row:last-child{border-bottom:none;}
    .data-label{font-size:13px;color:var(--text-muted);}
    .data-value{font-size:13px;font-weight:700;font-family:var(--font-mono);}
    .notes-card{background:var(--bg-card);border-radius:12px;padding:14px;margin-bottom:14px;border:1px solid var(--border-blue);}
    .notes-title{font-size:10px;color:var(--text-dim);font-weight:700;letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;}
    .notes-text{font-size:12px;color:var(--text-muted);line-height:1.7;}

    /* Timeframe table */
    .tf-table{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--font-mono);}
    .tf-table th{color:var(--text-dim);font-size:10px;text-align:left;padding:4px 8px;border-bottom:1px solid var(--border);}
    .tf-table td{padding:7px 8px;border-bottom:1px solid var(--border);}
    .tf-table tr:last-child td{border-bottom:none;}

    /* Strategy rows */
    .strat-row{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);}
    .strat-row:last-child{border-bottom:none;}
    .strat-name{font-family:var(--font-mono);color:var(--text-muted);font-size:11px;flex:1;}
    .strat-score{font-family:var(--font-mono);font-size:12px;font-weight:700;margin-right:10px;}
    .strat-bias{font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;border:1px solid;font-family:var(--font-mono);}

    /* Plans */
    .screen-title{font-size:22px;font-weight:800;color:var(--text);}
    .screen-sub{font-size:13px;color:var(--text-muted);margin-top:2px;}
    .plan-card{background:var(--bg-card);border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid var(--border);position:relative;overflow:hidden;}
    .plan-card.active-plan{box-shadow:0 0 24px #3b82f622;}
    .plan-active-banner{position:absolute;top:0;right:0;padding:3px 10px;border-bottom-left-radius:8px;font-size:9px;font-weight:800;color:var(--bg);letter-spacing:1px;}
    .plan-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
    .plan-name{font-size:18px;font-weight:800;} .plan-price{font-size:16px;font-weight:700;color:var(--text);}
    .plan-feature{display:flex;gap:8px;margin-bottom:5px;align-items:flex-start;}
    .plan-check{font-size:12px;font-weight:700;margin-top:1px;} .plan-feat-text{font-size:12px;color:var(--text-muted);}
    .btn-subscribe{width:100%;margin-top:14px;border-radius:10px;padding:12px;font-size:14px;font-weight:700;border:1px solid;background:none;}
    .plans-note{font-size:12px;color:var(--text-dim);text-align:center;line-height:1.6;margin-top:8px;}

    /* Profile */
    .profile-avatar-area{text-align:center;padding:28px 0 20px;}
    .profile-avatar{width:72px;height:72px;border-radius:50%;background:var(--bg-card);border:2px solid;display:inline-flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;margin-bottom:10px;}
    .profile-name{font-size:18px;font-weight:700;} .profile-email{font-size:13px;color:var(--text-muted);margin-top:2px;}
    .profile-plan-badge{display:inline-block;padding:4px 14px;border-radius:20px;border:1px solid;font-size:12px;font-weight:700;margin-top:8px;}
    .section-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin:20px 0 8px;}
    .info-card{background:var(--bg-card);border-radius:12px;overflow:hidden;border:1px solid var(--border);}
    .info-row{display:flex;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;}
    .info-row:last-child{border-bottom:none;}
    .info-row-label{color:var(--text-muted);}
    .btn-logout{width:100%;margin-top:20px;background:#ef444415;border:1px solid #ef444433;border-radius:12px;padding:14px;color:var(--red);font-size:15px;font-weight:700;}
    .app-version{text-align:center;color:var(--text-dim);font-size:11px;margin-top:20px;}

    /* Refresh */
    .refresh-bar{display:flex;justify-content:center;align-items:center;gap:6px;padding:6px;font-size:11px;color:var(--text-dim);}
    .refresh-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    /* Toast */
    .toast{position:fixed;bottom:calc(80px + var(--safe-bot) + 12px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg-card);color:var(--text);border:1px solid var(--border-blue);padding:10px 18px;border-radius:30px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:200;white-space:nowrap;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    /* Install */
    .install-banner{display:none;background:var(--blue-dark);border-bottom:1px solid var(--blue);padding:10px 16px;align-items:center;gap:10px;font-size:13px;}
    .install-banner.show{display:flex;}
    .btn-install{background:var(--blue);color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;}
    .btn-dismiss{background:none;color:var(--text-muted);font-size:18px;padding:0 4px;}

    @keyframes activeGlow{0%,100%{box-shadow:0 0 0 #22c55e00}50%{box-shadow:0 0 16px #22c55e44}}
    .trade-active{animation:activeGlow 3s ease-in-out infinite;}
    .fade-in{animation:fadeIn .3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div id="app">
  <div class="install-banner" id="install-banner">
    <span style="flex:1;color:var(--text)">📲 Instale o OUEngine na sua tela inicial</span>
    <button class="btn-install" id="btn-install">Instalar</button>
    <button class="btn-dismiss" id="btn-dismiss">✕</button>
  </div>

  <!-- LOGIN -->
  <div class="screen active" id="screen-login" style="overflow-y:auto">
    <div class="login-logo-area" style="margin-top:48px">
      <div class="login-logo">⬡ OUENGINE</div>
      <div class="login-logo-sub">SIGNAL TERMINAL</div>
    </div>
    <div class="login-card" style="margin:0 auto 32px">
      <div class="login-title" id="login-title">Entrar na conta</div>
      <div class="error-msg" id="login-error"></div>
      <div class="form-group" id="field-name" style="display:none">
        <label class="form-label">Nome</label>
        <input class="form-input" id="input-name" type="text" placeholder="Seu nome" autocomplete="name"/>
      </div>
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input class="form-input" id="input-email" type="email" placeholder="seu@email.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input class="form-input" id="input-password" type="password" placeholder="Mínimo 6 caracteres" autocomplete="current-password"/>
      </div>
      <button class="btn-primary" id="btn-auth">Entrar</button>
      <button class="btn-switch" id="btn-switch-mode">Não tem conta? Cadastre-se grátis</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="screen" id="screen-main">
    <div class="app-header">
      <div><div class="logo-text">⬡ OUENGINE</div><div class="logo-sub">SIGNAL TERMINAL</div></div>
      <div class="plan-badge" id="header-plan-badge">FREE</div>
    </div>
    <div class="screen active" id="tab-signals" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
      <div class="scroll-area" id="signals-list">
        <div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Carregando sinais...</div></div>
      </div>
    </div>
    <div class="screen" id="tab-history" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
      <div style="padding:16px 16px 4px;background:var(--bg-panel);border-bottom:1px solid var(--border)">
        <div class="screen-title">Histórico</div>
        <div class="screen-sub" id="history-subtitle">operações encerradas</div>
      </div>
      <div class="scroll-area" id="history-list"><div class="loading-wrap"><div class="spinner"></div></div></div>
    </div>
    <div class="screen" id="tab-plans" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
      <div style="padding:16px 16px 4px;background:var(--bg-panel);border-bottom:1px solid var(--border)">
        <div class="screen-title">Planos</div>
        <div class="screen-sub">Plano atual: <span id="current-plan-label" style="font-weight:700">FREE</span></div>
      </div>
      <div class="scroll-area" id="plans-content"></div>
    </div>
    <div class="screen" id="tab-profile" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
      <div style="padding:16px 16px 4px;background:var(--bg-panel);border-bottom:1px solid var(--border)">
        <div class="screen-title">Perfil</div>
      </div>
      <div class="scroll-area" id="profile-content"></div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="signals"><span class="tab-icon">📡</span><span class="tab-label">Sinais</span></button>
      <button class="tab-btn" data-tab="history"><span class="tab-icon">📋</span><span class="tab-label">Histórico</span></button>
      <button class="tab-btn" data-tab="plans"><span class="tab-icon">⭐</span><span class="tab-label">Planos</span></button>
      <button class="tab-btn" data-tab="profile"><span class="tab-icon">👤</span><span class="tab-label">Perfil</span></button>
    </div>
  </div>
</div>

<div class="sheet-overlay" id="sheet-overlay">
  <div class="sheet"><div class="sheet-handle"></div><div id="sheet-body"></div></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════
const API = 'https://ouengine-api.onrender.com';
const PLAN_ORDER  = { free:0, level1:1, level2:2, level3:3 };
const PLAN_COLORS = { free:'#6b7280', level1:'#3b82f6', level2:'#8b5cf6', level3:'#f59e0b' };
const PLAN_LABELS = { free:'FREE', level1:'PLANO 1', level2:'PLANO 2', level3:'PLANO 3' };
const MODE_LABELS = { SCL:'SCALP', DTD:'DAY TRADE', SWG:'SWING' };
const MODE_COLORS = { SCL:'#f59e0b', DTD:'#3b82f6', SWG:'#8b5cf6' };

// ── STATUS UI ─────────────────────────────────────────────────
// O trade_status vem do banco e é IMUTÁVEL — nunca recua.
// O frontend apenas lê e renderiza. Zero lógica de cálculo de TP aqui.
const STATUS_UI = {
  waiting: { label:'⏳ Aguardando entrada',               color:'#64748b', pulse:true  },
  active:  { label:'✅ OPERAÇÃO ATIVA',                    color:'#22c55e', pulse:true  },
  tp1:     { label:'🎯 TP1 Atingido — operação aberta',    color:'#4ade80', pulse:false },
  tp2:     { label:'🎯 TP2 Atingido — operação aberta',    color:'#22c55e', pulse:false },
  tp3:     { label:'🏆 TP3 — Take Profit Final!',          color:'#10b981', pulse:false },
  stop:    { label:'🛑 Stop Loss Atingido',                color:'#ef4444', pulse:false },
  invalid: { label:'❌ Inválido — stop antes da entrada',  color:'#ef444488',pulse:false },
};

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let state = {
  token:      localStorage.getItem('ou_token') || null,
  user:       JSON.parse(localStorage.getItem('ou_user') || 'null'),
  signals:    [],
  history:    [],
  lastStatus: {}, // { [id]: string } — para detectar transições e toasts
};

// ══════════════════════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════════════════════
async function apiFetch(path, opts = {}) {
  const headers = { 'Content-Type':'application/json', ...(opts.headers||{}) };
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  const res  = await fetch(API + path, { ...opts, headers });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Erro desconhecido');
  return data;
}

// ══════════════════════════════════════════════════════════════
//  FILL VISUAL (entry → preço atual)
//  Puramente cosmético — a veracidade do estado está no banco.
// ══════════════════════════════════════════════════════════════
function calcFill(signal) {
  const { bias, entry_min, entry_max, stop_loss, tp1, tp2, tp3, current_price, trade_status } = signal;
  // Agulha sempre aparece se tiver preço — independente do status
  if (!current_price || !entry_min || !stop_loss) return null;
  if (trade_status === 'invalid') return null;

  const isShort  = bias === -1;
  const entryMax = entry_max || entry_min;
  const entryMid = (entry_min + entryMax) / 2;

  const allVals = [stop_loss, entry_min, entryMax, tp1, tp2, tp3, current_price].filter(v=>v!=null);
  const minVal  = Math.min(...allVals);
  const range   = Math.max(...allVals) - minVal || 1;
  const pct     = v => ((v - minVal) / range * 100);

  const fromPct = pct(entryMid);
  const toPct   = pct(current_price);
  const towardProfit = isShort ? current_price < entryMid : current_price > entryMid;

  // Em waiting: mostra fill cinza (preço longe da entrada) vs fill colorido (próximo)
  const isWaiting = trade_status === 'waiting';

  return {
    leftPct:   Math.min(fromPct, toPct),
    widthPct:  Math.abs(toPct - fromPct),
    direction: towardProfit ? 'profit' : 'loss',
    isWaiting,
    isShort,
  };
}

// ══════════════════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════════════════
let loginMode = 'login';
function setLoginMode(mode) {
  loginMode = mode;
  const isReg = mode === 'register';
  document.getElementById('login-title').textContent = isReg ? 'Criar conta' : 'Entrar na conta';
  document.getElementById('field-name').style.display = isReg ? 'block' : 'none';
  document.getElementById('btn-auth').textContent = isReg ? 'Criar conta' : 'Entrar';
  document.getElementById('btn-switch-mode').textContent = isReg ? 'Já tem conta? Entrar' : 'Não tem conta? Cadastre-se grátis';
  document.getElementById('input-password').autocomplete = isReg ? 'new-password' : 'current-password';
  hideError();
}
document.getElementById('btn-switch-mode').addEventListener('click', () => setLoginMode(loginMode==='login'?'register':'login'));
document.getElementById('btn-auth').addEventListener('click', doAuth);
['input-email','input-password','input-name'].forEach(id => document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doAuth(); }));

async function doAuth() {
  const email = document.getElementById('input-email').value.trim().toLowerCase();
  const password = document.getElementById('input-password').value;
  const name = document.getElementById('input-name').value.trim();
  const btn = document.getElementById('btn-auth');
  if (!email||!password) { showError('Preencha e-mail e senha.'); return; }
  if (loginMode==='register'&&!name) { showError('Preencha seu nome.'); return; }
  btn.disabled=true; btn.textContent='...'; hideError();
  try {
    let data;
    if (loginMode==='login') {
      data = await apiFetch('/auth/login',{method:'POST',body:JSON.stringify({email,password})});
    } else {
      await apiFetch('/auth/register',{method:'POST',body:JSON.stringify({name,email,password})});
      data = await apiFetch('/auth/login',{method:'POST',body:JSON.stringify({email,password})});
    }
    state.token=data.token; state.user=data.user;
    localStorage.setItem('ou_token',data.token); localStorage.setItem('ou_user',JSON.stringify(data.user));
    enterApp();
  } catch(e) { showError(e.message); }
  finally { btn.disabled=false; btn.textContent=loginMode==='login'?'Entrar':'Criar conta'; }
}
function showError(msg) { const el=document.getElementById('login-error'); el.textContent=msg; el.classList.add('show'); }
function hideError() { document.getElementById('login-error').classList.remove('show'); }

// ══════════════════════════════════════════════════════════════
//  APP INIT
// ══════════════════════════════════════════════════════════════
function enterApp() {
  showScreen('main'); updateHeader(); renderPlans(); renderProfile();
  loadSignals();
  setInterval(loadSignals, 15000);
}
function showScreen(name) {
  ['login','main'].forEach(n => document.getElementById(`screen-${n}`).classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
}
function updateHeader() {
  const plan=state.user?.plan||'free'; const color=PLAN_COLORS[plan];
  const b=document.getElementById('header-plan-badge');
  b.textContent=PLAN_LABELS[plan]; b.style.color=color; b.style.borderColor=color+'66'; b.style.backgroundColor=color+'22';
}

// ══════════════════════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));
  ['signals','history','plans','profile'].forEach(t => {
    const el = document.getElementById(`tab-${t}`);
    el.classList.toggle('active', t===tab); el.style.display = t===tab ? 'flex' : 'none';
  });
  if (tab==='history'&&state.history.length===0) loadHistory();
}
document.addEventListener('DOMContentLoaded', () => {
  ['history','plans','profile'].forEach(t => { document.getElementById(`tab-${t}`).style.display='none'; });
});

// ══════════════════════════════════════════════════════════════
//  SIGNALS — LOAD
// ══════════════════════════════════════════════════════════════
async function loadSignals() {
  try {
    const fresh = await apiFetch('/signals/active');

    // Detecta transições de status para toasts
    fresh.forEach(s => {
      const prev = state.lastStatus[s.id];
      const cur  = s.trade_status;
      if (prev !== undefined && prev !== cur) {
        if (cur==='active')  showToast(`🟢 ${s.symbol} — Entrada executada!`);
        if (cur==='tp1')     showToast(`🎯 ${s.symbol} — TP1 Atingido!`);
        if (cur==='tp2')     showToast(`🎯 ${s.symbol} — TP2 Atingido!`);
        if (cur==='tp3')     showToast(`🏆 ${s.symbol} — TP3! Take Profit Final!`);
        if (cur==='stop')    showToast(`🛑 ${s.symbol} — Stop atingido.`);
      }
      state.lastStatus[s.id] = cur;
    });

    state.signals = fresh;
    renderSignals();
  } catch(e) {
    document.getElementById('signals-list').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-text">Erro ao carregar sinais</div>
        <div class="empty-sub">${e.message}</div>
        <button onclick="loadSignals()" style="margin-top:14px;background:var(--blue);color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700">Tentar novamente</button>
      </div>`;
  }
}

function renderSignals() {
  const container = document.getElementById('signals-list');
  const active = state.signals.filter(s => !s.closed);
  let html = `
    <div class="refresh-bar"><div class="refresh-dot"></div><span>Preço atualizado a cada 15 segundos</span></div>
    <div class="list-header">
      <div class="list-header-text"><span class="dot-live">● </span>${active.length} sinais ativos</div>
      <div class="list-header-date">${new Date().toLocaleDateString('pt-BR')}</div>
    </div>`;
  if (!state.signals.length) {
    html += `<div class="empty-state"><div class="empty-icon">📡</div><div class="empty-text">Nenhum sinal ativo</div></div>`;
  } else {
    state.signals.forEach(s => { html += buildSignalCard(s); });
  }
  container.innerHTML = html;
  container.querySelectorAll('.signal-card[data-id]').forEach(card => {
    card.addEventListener('click', () => openDetail(Number(card.dataset.id)));
  });
}

async function loadHistory() {
  try {
    const data = await apiFetch('/signals?closed=1&limit=50');
    state.history = data.data || [];
    renderHistory();
  } catch(e) {}
}
function renderHistory() {
  const container = document.getElementById('history-list');
  document.getElementById('history-subtitle').textContent = `${state.history.length} operações encerradas`;
  if (!state.history.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Nenhuma operação encerrada</div></div>`;
    return;
  }
  let html = '';
  state.history.forEach(s => { html += buildSignalCard(s); });
  container.innerHTML = html;
  container.querySelectorAll('.signal-card[data-id]').forEach(card => {
    card.addEventListener('click', () => openDetail(Number(card.dataset.id)));
  });
}

// ══════════════════════════════════════════════════════════════
//  CARD BUILDER
// ══════════════════════════════════════════════════════════════
function buildSignalCard(signal) {
  const userPlan   = state.user?.plan || 'free';
  const accessible = canAccess(signal.plan_required, userPlan);
  const isShort    = signal.bias === -1;
  const locked     = !accessible;
  const scoreColor = signal.score>=80 ? '#22c55e' : signal.score>=65 ? '#facc15' : '#ef4444';

  const mode = signal.signal_mode || 'DTD';
  const modeBadge = `<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;border:1px solid ${MODE_COLORS[mode]}44;background:${MODE_COLORS[mode]}18;color:${MODE_COLORS[mode]};font-family:var(--font-mono)">${MODE_LABELS[mode]||mode}</span>`;

  // Data/hora
  const dateLabel = signal.signal_time
    ? `${signal.signal_date} às ${signal.signal_time.substring(0,5)}`
    : signal.signal_date;

  // Status do banco — imutável
  const status   = signal.trade_status || 'waiting';
  const statusUI = STATUS_UI[status] || STATUS_UI.waiting;

  // Tem operação definida?
  const hasOp = signal.entry_min != null && signal.stop_loss != null && signal.tp1 != null;

  // Status bar
  let statusBarHtml = '';
  if (accessible && !signal.closed && hasOp) {
    statusBarHtml = `
      <div class="trade-status-bar" style="background:${statusUI.color}15;border-color:${statusUI.color}33">
        <div class="trade-status-dot ${statusUI.pulse?'pulse':''}" style="background:${statusUI.color}"></div>
        <span class="trade-status-text" style="color:${statusUI.color}">${statusUI.label}</span>
        ${signal.current_price ? `<span class="trade-status-price">Preço: ${fmtNum(signal.current_price)}</span>` : ''}
      </div>`;
  }

  // TP milestones (apenas quando entry foi executada)
  let milestonesHtml = '';
  if (accessible && !signal.closed && hasOp && signal.entry_executed) {
    const tps = [
      { label:'TP1', hit:!!signal.tp1_hit, color:'#4ade80', has:signal.tp1!=null },
      { label:'TP2', hit:!!signal.tp2_hit, color:'#22c55e', has:signal.tp2!=null },
      signal.tp3 != null
        ? { label:'TP3', hit:!!signal.tp3_hit, color:'#10b981', has:true }
        : { label:'TP3', hit:false, color:'#334155', has:true, ph:true },
    ].filter(t => t.has);

    milestonesHtml = `<div class="tp-milestones">` + tps.map(tp => {
      const style = tp.ph
        ? `color:#334155;border-color:#334155;background:transparent`
        : tp.hit
          ? `color:${tp.color};border-color:${tp.color}55;background:${tp.color}22`
          : `color:${tp.color}55;border-color:${tp.color}22;background:transparent`;
      return `<div class="tp-milestone ${tp.hit?'hit':'pending'}" style="${style}">${tp.ph?'—':tp.hit?'✓':'○'} ${tp.label}</div>`;
    }).join('') + `</div>`;
  }

  // Closed badge
  let closedBadge = '';
  if (signal.closed) {
    const { label, color } = closedBadgeInfo(signal.close_reason);
    closedBadge = `<div class="closed-badge" style="color:${color};border-color:${color}44;background:${color}11">${label}</div>`;
  }

  // Bias badge
  let biasHtml = locked
    ? `<span class="bias-badge" style="color:var(--text-muted);border-color:var(--border);background:var(--bg-panel)">🔒 BLOQUEADO</span>`
    : signal.bias === 0
      ? `<span class="bias-badge" style="color:#64748b;border-color:#64748b44;background:#64748b18">◈ NEUTRO</span>`
      : `<span class="bias-badge" style="color:${isShort?'var(--red)':'var(--green)'};border-color:${isShort?'#ef444444':'#22c55e44'};background:${isShort?'#7f1d1d33':'#064e3b33'}">${isShort?'▼ SHORT':'▲ LONG'}</span>`;

  // Barra de preço
  let barHtml = '';
  if (locked) {
    barHtml = `<div class="locked-bar"><span style="font-size:20px">🔒</span><span style="font-size:11px;color:var(--text-dim)">Disponível no <b style="color:${PLAN_COLORS[signal.plan_required]}">${PLAN_LABELS[signal.plan_required]}</b></span></div>`;
  } else if (!hasOp) {
    barHtml = `<div class="waiting-card"><div style="font-size:18px;margin-bottom:4px">⏳</div><div style="font-size:11px;color:var(--text-dim)">Aguardando configuração de entrada</div></div>`;
  } else {
    barHtml = buildPriceBar(signal);
  }

  // Chips
  let chipsHtml = '';
  if (accessible) {
    const chips = [];
    if (signal.regime) chips.push(['var(--blue)', signal.regime]);
    if (signal.entry_executed && !signal.closed) chips.push(['var(--purple)', 'ENTRADA EXEC.']);
    if (chips.length) chipsHtml = `<div class="chips">${chips.map(([c,l]) => `<span class="chip" style="color:${c};border-color:${c}33;background:${c}18">${l}</span>`).join('')}</div>`;
  }

  const lineColor = signal.closed ? '#334155'
    : status==='stop' ? '#ef4444'
    : ['tp1','tp2','tp3','active'].includes(status) ? '#22c55e'
    : isShort ? '#ef444466' : '#22c55e66';

  const glowClass = (!signal.closed && status==='active') ? 'trade-active' : '';

  return `
    <div class="signal-card fade-in ${signal.closed?'closed':''} ${locked?'locked':''} ${glowClass}" ${accessible?`data-id="${signal.id}"`:''}> 
      <div class="card-top-line" style="background:${lineColor}"></div>
      <div class="card-header">
        <div>
          <div class="card-symbol-row">
            <span class="card-symbol">${signal.symbol}</span>
            ${biasHtml}
            ${modeBadge}
          </div>
          <div class="card-date">${dateLabel}</div>
        </div>
        <div class="score-circle" style="border-color:${scoreColor};box-shadow:0 0 10px ${scoreColor}33">
          <span class="score-num" style="color:${scoreColor}">${signal.score}</span>
          <span class="score-label">score</span>
        </div>
      </div>
      ${closedBadge}
      ${statusBarHtml}
      ${milestonesHtml}
      ${barHtml}
      ${chipsHtml}
    </div>`;
}

// ══════════════════════════════════════════════════════════════
//  PRICE BAR
// ══════════════════════════════════════════════════════════════
function buildPriceBar(signal) {
  const { bias, stop_loss, entry_min, entry_max, tp1, tp2, tp3, current_price } = signal;
  const isShort  = bias === -1;

  // Ponto exato de entrada para o label (entry_point salvo pelo upload.js)
  // Fallback: média da zona
  const entryPoint = signal.entry_point ?? ((entry_min + (entry_max || entry_min)) / 2);
  const entryMax   = entry_max || entry_min;

  // Inclui current_price no cálculo de escala para a agulha nunca sair da barra
  const allVals = [stop_loss, entry_min, entryMax, tp1, tp2, tp3, current_price].filter(v=>v!=null);
  if (!allVals.length) return '';
  const minVal  = Math.min(...allVals);
  const maxVal  = Math.max(...allVals);
  // Adiciona 2% de padding nas bordas para agulha não colar nas extremidades
  const padding = (maxVal - minVal) * 0.02;
  const rangeMin = minVal - padding;
  const range    = (maxVal + padding) - rangeMin || 1;
  const pct      = v => Math.max(0, Math.min(98, ((v - rangeMin) / range * 100))).toFixed(2);

  const lastTp = tp3 ?? tp2 ?? tp1;
  const gradLeft  = Math.min(parseFloat(pct(stop_loss)), parseFloat(pct(lastTp)));
  const gradWidth = Math.abs(parseFloat(pct(lastTp)) - parseFloat(pct(stop_loss)));
  const gradStyle = isShort
    ? `background:linear-gradient(to left,#ef444420,#10b98120)`
    : `background:linear-gradient(to right,#ef444420,#10b98120)`;

  // Zona de entrada — largura mínima de 1.5% para ser visível
  const entryLeftPct  = parseFloat(pct(entry_min));
  const entryRightPct = parseFloat(pct(entryMax));
  const entryWidth    = Math.max(Math.abs(entryRightPct - entryLeftPct), 1.5);

  // Fill: entry → preço atual (aparece em todos os estados exceto invalid)
  let fillHtml = '';
  const fill = calcFill(signal);
  if (fill && fill.widthPct > 0.05) {
    let gradient;
    if (fill.isWaiting) {
      // Waiting: fill cinza indicando distância até a entrada
      gradient = 'linear-gradient(to right,#33415522,#47556944)';
    } else {
      gradient = fill.direction === 'profit'
        ? (isShort ? 'linear-gradient(to left,#22c55e99,#10b98155)' : 'linear-gradient(to right,#22c55e55,#10b98199)')
        : (isShort ? 'linear-gradient(to left,#ef444455,#dc262699)' : 'linear-gradient(to right,#ef444455,#dc262699)');
    }
    fillHtml = `<div class="pb-fill" style="left:${fill.leftPct.toFixed(2)}%;width:${fill.widthPct.toFixed(2)}%;background:${gradient}"></div>`;
  }

  // Pontos — estado dos TPs vem do banco (imutável)
  const points = [
    { label:'STOP',  value:stop_loss,  labelValue:stop_loss,  color:'#ef4444', shape:'circle', hit:false },
    { label:'ENTRY', value:entryPoint, labelValue:entryPoint, color:'#facc15', shape:'square', hit:false },
    { label:'TP1',   value:tp1,        labelValue:tp1,        color:'#4ade80', shape:'circle', hit:!!signal.tp1_hit },
    ...(tp2!=null ? [{ label:'TP2', value:tp2, labelValue:tp2, color:'#22c55e', shape:'circle', hit:!!signal.tp2_hit }] : []),
    ...(tp3!=null ? [{ label:'TP3', value:tp3, labelValue:tp3, color:'#10b981', shape:'circle', hit:!!signal.tp3_hit }] : []),
  ];

  const dotsHtml = points.map(p => {
    const glow  = p.hit ? `box-shadow:0 0 14px ${p.color},0 0 4px #fff` : `box-shadow:0 0 6px ${p.color}88`;
    const inner = p.hit ? `<div class="pb-dot-check">✓</div><div class="pb-dot-ring" style="border-color:${p.color}"></div>` : '';
    return `<div class="pb-dot ${p.shape} ${p.hit?'hit':''}" style="left:${pct(p.value)}%;background:${p.color};${glow}">${inner}</div>`;
  }).join('');

  // Agulha — sempre visível quando tiver preço atual
  const needleHtml = current_price != null
    ? `<div class="pb-needle" style="left:${pct(current_price)}%"><div class="pb-needle-label">▼ ${fmtNum(current_price)}</div></div>`
    : '';

  // Labels
  const allLabels = [...points];
  if (tp3==null && tp2!=null) {
    const tp2Pct = parseFloat(pct(tp2));
    const tp1Pct = parseFloat(pct(tp1));
    const estPct = Math.max(0, Math.min(96, tp2Pct + (tp2Pct - tp1Pct) * 0.8));
    allLabels.push({ label:'TP3', placeholder:true, estPct, color:'#334155' });
  }

  const labelsHtml = allLabels.map(p => {
    const pos   = p.placeholder ? p.estPct.toFixed(2) : pct(p.value);
    const clamp = Math.max(0, Math.min(96, parseFloat(pos)));
    if (p.placeholder) return `<div class="pb-label" style="left:${clamp}%"><div class="pb-label-name" style="color:#334155">TP3</div><div class="pb-label-value" style="color:#334155">—</div></div>`;
    const nameStyle = p.hit ? `color:${p.color};text-shadow:0 0 8px ${p.color}88` : `color:${p.color}`;
    return `<div class="pb-label" style="left:${clamp}%"><div class="pb-label-name" style="${nameStyle}">${p.label}${p.hit?' ✓':''}</div><div class="pb-label-value">${fmtNum(p.labelValue)}</div></div>`;
  }).join('');

  return `
    <div class="price-bar-wrap">
      <div class="price-bar-track-area">
        <div class="pb-track"></div>
        <div class="pb-grad" style="left:${gradLeft}%;width:${gradWidth}%;${gradStyle}"></div>
        <div class="pb-entry-zone" style="left:${Math.min(entryLeftPct,entryRightPct)}%;width:${entryWidth}%"></div>
        ${fillHtml}
        ${dotsHtml}
        ${needleHtml}
      </div>
      <div class="pb-labels">${labelsHtml}</div>
    </div>`;
}

// ══════════════════════════════════════════════════════════════
//  DETAIL SHEET
// ══════════════════════════════════════════════════════════════
async function openDetail(id) {
  const overlay = document.getElementById('sheet-overlay');
  const body    = document.getElementById('sheet-body');
  body.innerHTML = `<div class="loading-wrap" style="min-height:200px"><div class="spinner"></div></div>`;
  overlay.classList.add('open');

  try {
    const s = await apiFetch(`/signals/${id}`);
    const isShort  = s.bias === -1;
    const status   = s.trade_status || 'waiting';
    const statusUI = STATUS_UI[status] || STATUS_UI.waiting;
    const hasOp    = s.entry_min != null && s.stop_loss != null && s.tp1 != null;
    const { label: clLabel, color: clColor } = closedBadgeInfo(s.close_reason);

    // Timeframes
    let tfHtml = '';
    if (s.timeframes?.length) {
      const rows = s.timeframes.map(tf => {
        const dc = tf.direction==='LONG' ? '#22c55e' : tf.direction==='SHORT' ? '#ef4444' : '#64748b';
        return `<tr>
          <td style="font-weight:700;color:var(--text)">${tf.timeframe}</td>
          <td style="color:${dc};font-weight:700">${tf.direction}</td>
          <td style="text-align:right;color:var(--text-muted)">${tf.score??'—'}</td>
          <td style="text-align:right;color:#22c55e">${tf.long_pct!=null?tf.long_pct+'%':'—'}</td>
          <td style="text-align:right;color:#ef4444">${tf.short_pct!=null?tf.short_pct+'%':'—'}</td>
        </tr>`;
      }).join('');
      tfHtml = `<div class="notes-card">
        <div class="notes-title">ANÁLISE POR TIMEFRAME</div>
        <table class="tf-table">
          <thead><tr><th>TF</th><th>DIREÇÃO</th><th style="text-align:right">SCORE</th><th style="text-align:right">LONG%</th><th style="text-align:right">SHORT%</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }

    // Estratégias
    let stHtml = '';
    if (s.strategies?.length) {
      const rows = s.strategies.slice(0,15).map(st => {
        const bc = st.bias==='LONG' ? '#22c55e' : st.bias==='SHORT' ? '#ef4444' : '#64748b';
        const sc = st.score>=80 ? '#22c55e' : st.score>=60 ? '#facc15' : '#64748b';
        return `<div class="strat-row">
          <span class="strat-name">${st.strategy}</span>
          <span class="strat-score" style="color:${sc}">${st.score??'—'}</span>
          <span class="strat-bias" style="color:${bc};border-color:${bc}44;background:${bc}18">${st.bias}</span>
        </div>`;
      }).join('');
      stHtml = `<div class="notes-card">
        <div class="notes-title">ESTRATÉGIAS (${s.strategies.length})</div>
        ${rows}
        ${s.strategies.length>15?`<div style="font-size:11px;color:var(--text-dim);margin-top:8px;text-align:center">+ ${s.strategies.length-15} estratégias</div>`:''}
      </div>`;
    }

    // Eventos
    let evHtml = '';
    const evLabels = { entry_executed:'✅ Entrada executada', tp1_hit:'🎯 TP1 Atingido', tp2_hit:'🎯 TP2 Atingido', tp3_hit:'🏆 TP3 Atingido', stop_hit:'🛑 Stop Atingido', closed:'🔒 Trade Encerrado', invalid:'❌ Inválido' };
    if (s.events?.length) {
      evHtml = `<div class="notes-card">
        <div class="notes-title">EVENTOS DO TRADE</div>
        ${s.events.map(ev => `
          <div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);align-items:center">
            <span style="flex:1;font-size:12px;color:var(--text)">${evLabels[ev.event_type]||ev.event_type}</span>
            ${ev.price_at?`<span style="font-size:11px;font-family:var(--font-mono);color:var(--text-muted)">${fmtNum(ev.price_at)}</span>`:''}
            <span style="font-size:10px;color:var(--text-dim)">${new Date(ev.event_at).toLocaleString('pt-BR')}</span>
          </div>`).join('')}
      </div>`;
    }

    body.innerHTML = `
      <div class="sheet-header">
        <div style="flex:1">
          <div class="sheet-symbol">${s.symbol}</div>
          <div class="sheet-date">${s.signal_date}${s.signal_time?' às '+s.signal_time.substring(0,5):''}</div>
        </div>
        <span class="bias-badge" style="color:${isShort?'#ef4444':'#22c55e'};border-color:${isShort?'#ef444466':'#22c55e66'};background:${isShort?'#7f1d1d33':'#064e3b33'}">
          ${s.bias===0?'◈ NEUTRO':isShort?'▼ SHORT':'▲ LONG'}
        </span>
      </div>

      ${s.closed?`<div class="closed-badge" style="color:${clColor};border-color:${clColor}44;background:${clColor}11">${clLabel}</div>`:''}

      ${!s.closed&&hasOp?`
        <div class="trade-status-bar" style="background:${statusUI.color}15;border-color:${statusUI.color}33;margin-bottom:14px">
          <div class="trade-status-dot ${statusUI.pulse?'pulse':''}" style="background:${statusUI.color}"></div>
          <span class="trade-status-text" style="color:${statusUI.color}">${statusUI.label}</span>
          ${s.current_price?`<span class="trade-status-price">Preço: ${fmtNum(s.current_price)}</span>`:''}
        </div>`:''}

      ${hasOp&&s.entry_executed?`
        <div class="tp-milestones" style="margin-bottom:14px">
          ${[
            {label:'TP1',hit:!!s.tp1_hit,color:'#4ade80',has:s.tp1!=null},
            {label:'TP2',hit:!!s.tp2_hit,color:'#22c55e',has:s.tp2!=null},
            s.tp3!=null?{label:'TP3',hit:!!s.tp3_hit,color:'#10b981',has:true}:{label:'TP3',hit:false,color:'#334155',has:true,ph:true},
          ].filter(t=>t.has).map(tp=>{
            const style=tp.ph?'color:#334155;border-color:#334155;background:transparent'
              :tp.hit?`color:${tp.color};border-color:${tp.color}55;background:${tp.color}22`
              :`color:${tp.color}55;border-color:${tp.color}22;background:transparent`;
            return `<div class="tp-milestone ${tp.hit?'hit':'pending'}" style="${style}">${tp.ph?'—':tp.hit?'✓':'○'} ${tp.ph?tp.label+' (em breve)':tp.label}</div>`;
          }).join('')}
        </div>`:''}

      ${hasOp?`<div class="detail-map-card"><div class="detail-map-title">MAPA DA OPERAÇÃO</div>${buildPriceBar(s)}</div>`:''}

      <div class="data-card">
        ${[
          {label:'Score geral', value:s.score, color:s.score>=80?'#22c55e':'#facc15'},
          ...(hasOp?[
            {label:'Entrada',   value:fmtNum(s.entry_min), color:'#facc15'},
            {label:'Stop Loss', value:fmtNum(s.stop_loss), color:'#ef4444'},
            {label:'TP1',       value:fmtNum(s.tp1),       color:'#4ade80'},
            {label:'TP2',       value:fmtNum(s.tp2),       color:'#22c55e'},
            {label:'TP3',       value:s.tp3!=null?fmtNum(s.tp3):'— em breve', color:'#10b981'},
            {label:'ATR',       value:s.atr!=null?fmtNum(s.atr):'—',         color:'#64748b'},
            {label:'RR TP1',    value:s.rr_tp1!=null?String(s.rr_tp1):'—',   color:'#64748b'},
            {label:'RR TP2',    value:s.rr_tp2!=null?String(s.rr_tp2):'—',   color:'#64748b'},
          ]:[]),
          {label:'Regime', value:s.regime||'—', color:'#3b82f6'},
        ].map(r=>`<div class="data-row"><span class="data-label">${r.label}</span><span class="data-value" style="color:${r.color}">${r.value}</span></div>`).join('')}
      </div>

      ${tfHtml}
      ${stHtml}
      ${evHtml}
      ${s.notes?`<div class="notes-card"><div class="notes-title">ANÁLISE</div><div class="notes-text">${s.notes}</div></div>`:''}
    `;
  } catch(e) {
    body.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">${e.message}</div></div>`;
  }
}

document.getElementById('sheet-overlay').addEventListener('click', function(e) { if(e.target===this) closeSheet(); });
function closeSheet() { document.getElementById('sheet-overlay').classList.remove('open'); }

// ══════════════════════════════════════════════════════════════
//  PLANS & PROFILE
// ══════════════════════════════════════════════════════════════
const PLANS_DATA = [
  { id:'free',   price:'Grátis',     features:['Sinais aleatórios limitados','Score e regime visíveis'] },
  { id:'level1', price:'R$ 49/mês',  features:['Ativos básicos','▲ LONG / ▼ SHORT','Entry, Stop e TPs','Análise de timeframes'] },
  { id:'level2', price:'R$ 97/mês',  features:['Tudo do Plano 1','Ativos intermediários','Histórico completo'] },
  { id:'level3', price:'R$ 197/mês', features:['Todos os ativos','Sinais em tempo real','Score alto prioritário','Acesso antecipado'] },
];
function renderPlans() {
  const current=state.user?.plan||'free'; const color=PLAN_COLORS[current];
  document.getElementById('current-plan-label').textContent=PLAN_LABELS[current];
  document.getElementById('current-plan-label').style.color=color;
  let html='';
  PLANS_DATA.forEach(plan => {
    const c=PLAN_COLORS[plan.id]; const isMine=plan.id===current;
    const feats=plan.features.map(f=>`<div class="plan-feature"><span class="plan-check" style="color:${c}">✓</span><span class="plan-feat-text">${f}</span></div>`).join('');
    html+=`<div class="plan-card ${isMine?'active-plan':''}" style="${isMine?`border-color:${c}`:''}">
      ${isMine?`<div class="plan-active-banner" style="background:${c}">PLANO ATIVO</div>`:''}
      <div class="plan-card-header"><span class="plan-name" style="color:${c}">${PLAN_LABELS[plan.id]}</span><span class="plan-price">${plan.price}</span></div>
      ${feats}
      ${!isMine?`<button class="btn-subscribe" style="color:${c};border-color:${c}55" onclick="showToast('Em breve! Entre em contato para ativar.')">Assinar ${PLAN_LABELS[plan.id]}</button>`:''}
    </div>`;
  });
  html+=`<p class="plans-note">Para ativar um plano entre em contato.<br>Em breve pagamento automático disponível.</p>`;
  document.getElementById('plans-content').innerHTML=html;
}
function renderProfile() {
  const u=state.user||{}; const plan=u.plan||'free'; const color=PLAN_COLORS[plan];
  const initial=(u.name||'?').charAt(0).toUpperCase();
  const expires=u.plan_expires_at?new Date(u.plan_expires_at).toLocaleDateString('pt-BR'):null;
  document.getElementById('profile-content').innerHTML=`
    <div class="profile-avatar-area">
      <div class="profile-avatar" style="border-color:${color};color:var(--text)">${initial}</div>
      <div class="profile-name">${u.name||''}</div>
      <div class="profile-email">${u.email||''}</div>
      <span class="profile-plan-badge" style="color:${color};border-color:${color}55;background:${color}18">${PLAN_LABELS[plan]}</span>
    </div>
    <div class="section-label">Assinatura</div>
    <div class="info-card">
      <div class="info-row"><span class="info-row-label">Plano</span><span class="info-row-value" style="color:${color};font-weight:700">${PLAN_LABELS[plan]}</span></div>
      <div class="info-row"><span class="info-row-label">Status</span><span class="info-row-value">${plan==='free'?'Gratuito':'Ativo'}</span></div>
      ${expires?`<div class="info-row"><span class="info-row-label">Vence em</span><span class="info-row-value">${expires}</span></div>`:''}
    </div>
    <div class="section-label">Conta</div>
    <div class="info-card">
      <div class="info-row"><span class="info-row-label">Nome</span><span class="info-row-value">${u.name||''}</span></div>
      <div class="info-row"><span class="info-row-label">Email</span><span class="info-row-value">${u.email||''}</span></div>
    </div>
    <button class="btn-logout" onclick="doLogout()">Sair da conta</button>
    <div class="app-version">OUEngine v2.1.0</div>`;
}
async function doLogout() {
  if (!confirm('Deseja sair da sua conta?')) return;
  try { await apiFetch('/auth/logout',{method:'POST'}); } catch(_) {}
  state.token=null; state.user=null;
  localStorage.removeItem('ou_token'); localStorage.removeItem('ou_user');
  showScreen('login'); setLoginMode('login');
}

// ══════════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════════
function canAccess(sp,up) { return (PLAN_ORDER[up]??0)>=(PLAN_ORDER[sp]??0); }
function fmtNum(n) {
  if (n==null) return '—';
  if (n>1000) return n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  return Number(n).toFixed(n<10?4:2);
}
function closedBadgeInfo(reason) {
  if (reason==='stop_after_tp1') return {label:'✓ TP1 → STOP',color:'#fbbf24'};
  if (reason==='tp3')  return {label:'✓ TP1+TP2+TP3',color:'#10b981'};
  if (reason==='tp2')  return {label:'✓ TP1+TP2',color:'#22c55e'};
  if (reason==='tp1')  return {label:'✓ TP1',color:'#4ade80'};
  if (reason==='stop') return {label:'✕ STOP',color:'#ef4444'};
  return {label:'ENCERRADO',color:'#6b7280'};
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}

// PWA
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-banner').classList.add('show');});
document.getElementById('btn-install').addEventListener('click',()=>{if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('install-banner').classList.remove('show');});});
document.getElementById('btn-dismiss').addEventListener('click',()=>{document.getElementById('install-banner').classList.remove('show');});

// BOOT
if (state.token&&state.user) {
  apiFetch('/auth/me').then(me=>{
    state.user=me; localStorage.setItem('ou_user',JSON.stringify(me)); enterApp();
  }).catch(()=>{
    state.token=null; state.user=null;
    localStorage.removeItem('ou_token'); localStorage.removeItem('ou_user');
  });
}
